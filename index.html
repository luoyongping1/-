<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书书小手机</title>
    <style>
        /* --- 手机全屏容器设置 --- */
        body {
            margin: 0;
            padding: 0;
            display: block; 
            min-height: 100vh;
            background-color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
            overflow: hidden; 
            /* 禁用移动端长按弹出菜单 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        :root {
            --bg-color: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --accent-color: #ff6b6b;
            --blue-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .phone-container {
            width: 100%;        
            height: 100vh;      
            background: var(--bg-color);
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=1000');
        }

        /* --- 核心：网格布局容器 --- */
        .content {
            position: relative;
            z-index: 2;
            padding: 60px 20px 20px 20px; 
            height: 100%;
            display: grid;
            /* 4列布局 */
            grid-template-columns: repeat(4, 1fr);
            /* 每行高度约为 85px */
            grid-auto-rows: 85px;
            gap: 15px;
            box-sizing: border-box;
            align-content: start;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0);
            z-index: 1;
        }

        /* 统一的拖拽项样式 */
        .grid-item {
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: none; /* 关键：交给JS处理 */
        }

        /* 拖拽中样式 */
        .grid-item.dragging {
            z-index: 999;
            opacity: 0.8;
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: fixed !important; /* 拖动时脱离文档流 */
            pointer-events: none;
        }

        /* 时间组件：占4列 */
        .time-widget { 
            grid-column: span 4; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }
        .date-str { font-size: 14px; opacity: 0.9; }
        .clock-str { font-size: 56px; font-weight: bold; }

        /* 左侧小组件：占2x2 */
        .left-widget {
            grid-column: span 2;
            grid-row: span 2;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .heart-icon {
            position: absolute;
            top: 10px; left: 10px;
            width: 20px; height: 20px;
            fill: none; stroke: white; stroke-width: 1.5;
            z-index: 3;
        }
        .battery-container {
            position: absolute;
            bottom: 10px; left: 10px; right: 10px;
            height: 4px; background: rgba(255,255,255,0.3);
            border-radius: 2px; z-index: 3;
        }
        #battery-fill { height: 100%; background: #4cd137; width: 50%; border-radius: 2px; transition: width 0.5s; }

        /* App 图标：占1x1 */
        .icon-btn {
            grid-column: span 1;
            grid-row: span 1;
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; 
            display: flex; justify-content: center;
            align-items: center; font-size: 11px; backdrop-filter: blur(10px);
            cursor: pointer; text-align: center; line-height: 1.2;
            color: white; font-weight: 500;
            /* 确保图片自动裁剪填充且不缩放变形 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .icon-btn:active { transform: scale(0.9); }

        /* 进度条：占2x2 */
        .progress-widgets { 
            grid-column: span 2; 
            grid-row: span 2;
            display: flex; flex-direction: column; gap: 10px; 
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            justify-content: center;
        }
        .progress-item {
            width: 100%; font-size: 11px; text-align: right;
        }
        .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); margin-top: 5px; border-radius: 2px; }
        .bar-fill { height: 100%; background: var(--accent-color); border-radius: 2px; }

        /* --- 设置面板样式 --- */
        #settings-panel {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: #ffffff; z-index: 10; transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
            color: #333; 
        }
        #settings-panel.active { bottom: 0; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: #000; }
        .setting-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
        
        /* 设置面板内的输入框样式 */
        #settings-panel input, #settings-panel select, #settings-panel textarea {
            width: 100%; padding: 12px; background: #f2f2f7; border: 1px solid #ddd;
            color: #000; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px;
        }
        .action-btn {
            width: 100%; padding: 12px; background: var(--accent-color);
            border: none; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px;
        }

        /* 白色毛玻璃弹窗 */
        .glass-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.4); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); z-index: 200;
            display: none; justify-content: center; align-items: center;
        }
        .glass-modal-content {
            width: 85%; background: rgba(255,255,255,0.8); padding: 25px;
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); color: #333;
        }

        /* 悬浮球 */
        #floating-ball {
            position: absolute;
            width: 45px; height: 45px;
            background: var(--blue-gradient);
            z-index: 200;
            display: none; 
            cursor: move;
            transform: rotate(45deg); 
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.5);
            border: 2px solid rgba(255,255,255,0.3);
            touch-action: none;
        }
        #floating-ball::after {
            content: "✕";
            position: absolute;
            transform: rotate(-45deg);
            top: 10px; left: 14px;
            color: white; font-weight: bold; font-size: 16px;
        }

        /* App 启动层 */
        #app-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: none;
        }

        /* 世界书页面 */
        #worldbook-app {
            width: 100%; height: 100%; background: #1a1a1a;
            display: flex; flex-direction: column; color: white;
        }
        .wb-header {
            padding: 50px 20px 10px; background: #222;
            display: flex; align-items: center; gap: 10px;
        }
        .wb-search {
            flex: 1; padding: 8px 15px; border-radius: 20px;
            border: none; background: #333; color: white; outline: none;
        }
        .wb-add-icon { font-size: 24px; color: #4facfe; cursor: pointer; }
        .wb-content { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .wb-group { margin-bottom: 10px; border-radius: 10px; background: rgba(255,255,255,0.05); overflow: hidden; }
        .wb-group-title {
            padding: 12px 15px; background: rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; cursor: pointer;
            font-weight: bold; font-size: 14px;
        }
        .wb-group-content.collapsed { display: none; }
        .wb-item { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .wb-item-name { color: #00f2fe; margin-bottom: 4px; }
        .wb-item-text { color: #ccc; font-size: 12px; }

        #wb-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 150; display: none;
            padding: 40px 20px; box-sizing: border-box;
        }
    </style>
</head>

    <script>
        // --- 悬浮球逻辑 ---
        let ball = document.getElementById('floating-ball');
        let isDraggingBall = false;
        function startDrag(e) {
            isDraggingBall = false;
            let startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            let startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            let shiftX = startX - ball.getBoundingClientRect().left;
            let shiftY = startY - ball.getBoundingClientRect().top;
            function moveAt(pageX, pageY) {
                isDraggingBall = true;
                ball.style.left = pageX - shiftX + 'px';
                ball.style.top = pageY - shiftY + 'px';
            }
            function onMouseMove(e) {
                let pX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let pY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                moveAt(pX, pY);
            }
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('touchmove', onMouseMove);
            document.onmouseup = document.ontouchend = function() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('touchmove', onMouseMove);
                document.onmouseup = null;
                document.ontouchend = null;
            };
        }

        // --- 栅格图标拖拽排序逻辑 ---
        function initGridSortable() {
            const container = document.getElementById('main-grid');
            let draggingItem = null;
            let startX, startY;
            let moveDist = 0;
            container.addEventListener('touchstart', (e) => {
                const item = e.target.closest('.grid-item');
                if (!item) return;
                draggingItem = item;
                const touch = e.touches[0];
                startX = touch.clientX; startY = touch.clientY;
                moveDist = 0;
            }, {passive: false});
            container.addEventListener('touchmove', (e) => {
                if (!draggingItem) return;
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                const dy = touch.clientY - startY;
                moveDist = Math.hypot(dx, dy);
                if (moveDist > 15) {
                    e.preventDefault(); 
                    draggingItem.classList.add('dragging');
                    draggingItem.style.left = touch.clientX - (draggingItem.offsetWidth/2) + 'px';
                    draggingItem.style.top = touch.clientY - (draggingItem.offsetHeight/2) + 'px';
                    const target = document.elementFromPoint(touch.clientX, touch.clientY);
                    const overItem = target ? target.closest('.grid-item') : null;
                    if (overItem && overItem !== draggingItem) {
                        const rect = overItem.getBoundingClientRect();
                        const next = (touch.clientX > rect.left + rect.width / 2);
                        container.insertBefore(draggingItem, next ? overItem.nextSibling : overItem);
                    }
                }
            }, {passive: false});
            container.addEventListener('touchend', (e) => {
                if (!draggingItem) return;
                if (moveDist > 15) { e.preventDefault(); saveGridOrder(); }
                draggingItem.classList.remove('dragging');
                draggingItem.style.left = ''; draggingItem.style.top = ''; draggingItem = null;
            });
        }

        function updateTime() {
            const now = new Date();
            const weeks = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            document.getElementById('date-display').innerText = `${now.getMonth()+1}月${now.getDate()}日 ${weeks[now.getDay()]}`;
            document.getElementById('clock-display').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const start = new Date(now.getFullYear(), 0, 1);
            const end = new Date(now.getFullYear() + 1, 0, 1);
            const totalDays = (end - start) / 86400000;
            const remainDays = Math.ceil((end - now) / 86400000);
            document.getElementById('year-days').innerText = remainDays;
            document.getElementById('year-bar').style.width = (remainDays / totalDays * 100) + "%";
            const passedSecs = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
            const dayPercent = Math.floor(((86400 - passedSecs) / 86400) * 100);
            document.getElementById('day-percent').innerText = dayPercent;
            document.getElementById('day-bar').style.width = dayPercent + "%";
        }

        async function fetchModels() {
            const url = document.getElementById('api-url').value.replace(/\/$/, "");
            const key = document.getElementById('api-key').value;
            const modelSelect = document.getElementById('model-select');
            if(!url || !key) { alert("请先填写 URL 和密钥"); return; }
            modelSelect.innerHTML = '<option>拉取中...</option>';
            try {
                const response = await fetch(`${url}/models`, {
                    headers: { 'Authorization': `Bearer ${key}` }
                });
                const data = await response.json();
                modelSelect.innerHTML = '';
                const modelList = data.data || data;
                modelList.forEach(m => {
                    let opt = document.createElement('option');
                    opt.value = m.id; opt.innerText = m.id;
                    modelSelect.appendChild(opt);
                });
            } catch (err) { alert("拉取失败"); modelSelect.innerHTML = '<option value="">拉取失败</option>'; }
        }

        function confirmSavePreset() {

            if(!name) return alert("请输入预设名称");
            const newPreset = {
                name: name,
                url: document.getElementById('api-url').value,
                key: document.getElementById('api-key').value,

            };
            apiPresets.push(newPreset);

            alert("预设保存成功！");
            closePresetNameModal();
        }
        function showPresetListModal() {
            const container = document.getElementById('preset-items-container');
            container.innerHTML = "";
            if(apiPresets.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#999;'>暂无预设</p>";
            } else {
                apiPresets.forEach((p, index) => {
                    const div = document.createElement('div');
                    div.style = "background:rgba(0,0,0,0.05); padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;";
                    div.innerHTML = `
                        <div style="flex:1; cursor:pointer;" onclick="usePreset(${index})">
                            <div style="font-weight:bold; font-size:14px;">${p.name}</div>
                            <div style="font-size:10px; color:#666;">${p.model || '未选模型'}</div>
                        </div>
                        <button style="background:#ff4d4f; border:none; color:white; border-radius:6px; padding:5px 10px; font-size:12px;" onclick="deletePreset(${index})">删除</button>`;
                    container.appendChild(div);
                });
            }
            document.getElementById('preset-list-modal').style.display = "flex";
        }
        function closePresetListModal() { document.getElementById('preset-list-modal').style.display = "none"; }
        function usePreset(index) {
            const p = apiPresets[index];
            document.getElementById('api-url').value = p.url;
            document.getElementById('api-key').value = p.key;
            const modelSelect = document.getElementById('model-select');
            modelSelect.innerHTML = "";
            if(p.model) {
                const opt = document.createElement('option');
                opt.value = p.model; opt.innerText = p.model; opt.selected = true;
                modelSelect.appendChild(opt);
            } else {
                modelSelect.innerHTML = '<option value="">请先拉取</option>';
            }
            alert(`已切换到预设：${p.name}，请点击下方“保存并应用”生效`);
            closePresetListModal();
        }
        function deletePreset(index) {
            if(confirm("确定删除该预设吗？")) {
                apiPresets.splice(index, 1);
                localStorage.setItem('api_presets', JSON.stringify(apiPresets));
                showPresetListModal();
            }
        }

        // --- 更换 App 图标功能逻辑 ---

            'item-wb': '世界书', 'item-qq': 'QQ', 'item-xhs': '小红书',

        function handleIconUpload(input) {
            const file = input.files[0];

                const reader = new FileReader();
                reader.onload = function(e) {
                    saveAndApplyIcon(e.target.result);
                    closeIconChoiceModal(); showAppListModal();
                }
                reader.readAsDataURL(file);

        function showUrlInputModal() { document.getElementById('icon-url-modal').style.display = "flex"; }
        function closeUrlInputModal() { document.getElementById('icon-url-modal').style.display = "none"; }
        function saveIconUrl() {
            const url = document.getElementById('icon-url-input').value;
            if(!url) return alert("请输入 URL");
            saveAndApplyIcon(url);
            closeUrlInputModal(); closeIconChoiceModal(); showAppListModal();
            document.getElementById('icon-url-input').value = "";
        }
        function saveAndApplyIcon(imgData) {
            const appEl = document.getElementById(currentEditingAppId);
            appEl.style.backgroundImage = `url("${imgData}")`;
            let customIcons = JSON.parse(localStorage.getItem('app_custom_icons') || '{}');
            customIcons[currentEditingAppId] = imgData;
            localStorage.setItem('app_custom_icons', JSON.stringify(customIcons));
        }
        function resetIcon() {
            const appEl = document.getElementById(currentEditingAppId);
            appEl.style.backgroundImage = "";
            let customIcons = JSON.parse(localStorage.getItem('app_custom_icons') || '{}');
            delete customIcons[currentEditingAppId];
            localStorage.setItem('app_custom_icons', JSON.stringify(customIcons));
            closeIconChoiceModal(); showAppListModal();
        }

        // --- 数据导出导入功能逻辑 ---
        function exportFullData() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                data[key] = localStorage.getItem(key);
            }
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `shushu_phone_backup_${date}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importFullData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(confirm("导入将覆盖当前所有数据（世界书、背景、布局等），确定吗？")) {
                        localStorage.clear();
                        Object.keys(data).forEach(key => {
                            localStorage.setItem(key, data[key]);
                        });
                        alert("数据导入成功！页面即将刷新。");
                        location.reload();
                    }
                } catch (err) {
                    alert("导入失败：文件格式不正确");
                }
            };
            reader.readAsText(file);
        }

        // --- 后台保活功能逻辑 ---
        let silentAudio = null;
        function toggleKeepAlive(enabled) {
            if (enabled) {
                if (!silentAudio) {
                    silentAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==');
                    silentAudio.loop = true;
                    silentAudio.volume = 0.1;
                }
                silentAudio.play().then(() => {
                    localStorage.setItem('background_keep_alive', 'true');
                    console.log("保活音频已启动");
                }).catch(err => {
                    localStorage.setItem('background_keep_alive', 'false');
                    document.getElementById('keep-alive-toggle').checked = false;
                    alert("开启失败：浏览器限制自动播放。请在页面任意位置点击一下后再开启。");
                });
            } else {
                if (silentAudio) silentAudio.pause();
                localStorage.setItem('background_keep_alive', 'false');
                console.log("保活音频已停止");
            }
        }

                opt.value = savedConfig.model; opt.innerText = savedConfig.model; opt.selected = true;
                document.getElementById('model-select').appendChild(opt);
            }

            // 初始化 MiniMax 配置回显
const savedMiniMax = JSON.parse(localStorage.getItem('minimax_config') || '{}');
if(savedMiniMax.groupId) document.getElementById('minimax-group-id').value = savedMiniMax.groupId;
// 不再回显 URL 到输入框

                navigator.getBattery().then(b => { document.getElementById('battery-fill').style.width = (b.level * 100) + "%"; });

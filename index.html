<script>
    const PUBLIC_VAPID_KEY = 'BCukyNwnBw2K1QOkCzYIo4PECO9IBh-PTAH6XkBzsGo9yVjKkd2rMNq5FBOGrrT1wd36rOIFTnOP44uh6fG1GPU';

    // 1. 注册 Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js').then(registration => {
                console.log('SW 注册成功');
                // 注册成功后尝试询问权限
                askPermission();
            });
        });
    }

    // 2. 转换密钥格式的工具函数
    function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) {
            outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
    }

    // 3. 申请通知权限
    function askPermission() {
        if ('Notification' in window) {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    console.log('用户允许通知');
                    subscribeUser();
                }
            });
        }
    }

    // 4. 正式向推送服务器订阅
    async function subscribeUser() {
        const registration = await navigator.serviceWorker.ready;
        try {
            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(PUBLIC_VAPID_KEY)
            });
            // 保存订阅凭证到本地，以便 qq.html 调用
            localStorage.setItem('web_push_subscription', JSON.stringify(subscription));
            console.log('离线推送订阅成功');
        } catch (e) {
            console.error('订阅失败（可能是公钥不匹配）:', e);
        }
    }
</script>

    <script>
        // --- 悬浮球逻辑 ---
        let ball = document.getElementById('floating-ball');
        let isDraggingBall = false;
        function startDrag(e) {
            isDraggingBall = false;
            let startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            let startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            let shiftX = startX - ball.getBoundingClientRect().left;
            let shiftY = startY - ball.getBoundingClientRect().top;
            function moveAt(pageX, pageY) {
                isDraggingBall = true;
                ball.style.left = pageX - shiftX + 'px';
                ball.style.top = pageY - shiftY + 'px';
            }
            function onMouseMove(e) {
                let pX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let pY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                moveAt(pX, pY);
            }
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('touchmove', onMouseMove);
            document.onmouseup = document.ontouchend = function() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('touchmove', onMouseMove);
                document.onmouseup = null;
                document.ontouchend = null;
            };
        }

        // --- 栅格图标拖拽排序逻辑 ---
        function initGridSortable() {
    // 新增：全局禁止长按弹出右键菜单
    window.oncontextmenu = function(e) { e.preventDefault(); e.stopPropagation(); return false; };
    
    const container = document.getElementById('main-grid');
    let draggingItem = null;
            let startX, startY;
            let moveDist = 0;
            container.addEventListener('touchstart', (e) => {
                const item = e.target.closest('.grid-item');
                if (!item) return;
                draggingItem = item;
                const touch = e.touches[0];
                startX = touch.clientX; startY = touch.clientY;
                moveDist = 0;
            }, {passive: false});
            container.addEventListener('touchmove', (e) => {
                if (!draggingItem) return;
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                const dy = touch.clientY - startY;
                moveDist = Math.hypot(dx, dy);
                if (moveDist > 15) {
                    e.preventDefault(); 
                    draggingItem.classList.add('dragging');
                    draggingItem.style.left = touch.clientX - (draggingItem.offsetWidth/2) + 'px';
                    draggingItem.style.top = touch.clientY - (draggingItem.offsetHeight/2) + 'px';
                    const target = document.elementFromPoint(touch.clientX, touch.clientY);
                    const overItem = target ? target.closest('.grid-item') : null;
                    if (overItem && overItem !== draggingItem) {
                        const rect = overItem.getBoundingClientRect();
                        const next = (touch.clientX > rect.left + rect.width / 2);
                        container.insertBefore(draggingItem, next ? overItem.nextSibling : overItem);
                    }
                }
            }, {passive: false});
            container.addEventListener('touchend', (e) => {
                if (!draggingItem) return;
                if (moveDist > 15) { e.preventDefault(); saveGridOrder(); }
                draggingItem.classList.remove('dragging');
                draggingItem.style.left = ''; draggingItem.style.top = ''; draggingItem = null;
            });
        }

        function saveGridOrder() {
            const items = Array.from(document.querySelectorAll('.grid-item'));
            const order = items.map(el => el.id);
            localStorage.setItem('grid_layout_order', JSON.stringify(order));
        }

        function loadGridOrder() {
            const order = JSON.parse(localStorage.getItem('grid_layout_order'));
            if (order) {
                const container = document.getElementById('main-grid');
                order.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) container.appendChild(el);
                });
            }
        }

// --- 重新找回：左右滑动逻辑 ---
let swiperStartX = 0; 
let currentPageIndex = 0;

// 监听滑动开始
document.getElementById('swiper-container').addEventListener('touchstart', (e) => {
    swiperStartX = e.touches[0].clientX;
}, {passive: true});

// 监听滑动结束
document.getElementById('swiper-container').addEventListener('touchend', (e) => {
    let endX = e.changedTouches[0].clientX;
    let diff = swiperStartX - endX;
    const wrapper = document.getElementById('swiper-wrapper');
    const dots = document.querySelectorAll('.dot');

    if (Math.abs(diff) > 50) { // 滑动超过50像素才翻页
        if (diff > 0 && currentPageIndex === 0) {
            currentPageIndex = 1;
        } else if (diff < 0 && currentPageIndex === 1) {
            currentPageIndex = 0;
        }
        // 执行翻页动画
        wrapper.style.transform = `translateX(-${currentPageIndex * 50}%)`;
        // 更新小圆点状态
        dots.forEach((dot, index) => {
            dot.style.opacity = (index === currentPageIndex) ? "1" : "0.3";
        });
    }
});

// 下面是你原本就有的 wbData 逻辑...
let wbData = JSON.parse(localStorage.getItem('wb_data') || '{"groups":["默认分组"], "books":[]}');
let currentWbMode = 'global';
let editingBookIndex = null; 
let currentWbTab = 'global'; 

        function switchWbTab(scope) {
    currentWbTab = scope;
    document.getElementById('tab-scope-global').classList.toggle('active', scope === 'global');
    document.getElementById('tab-scope-local').classList.toggle('active', scope === 'local');
    renderWorldBook();
}

function renderWorldBook() {
    const container = document.getElementById('wb-list-container');
    const searchTerm = document.getElementById('wb-search-input').value.toLowerCase();
    container.innerHTML = "";
    wbData.groups.forEach(group => {
        const groupDiv = document.createElement('div');
        groupDiv.className = "wb-group";
        
        // 修改这里：增加了一个 b.scope === currentWbTab 的判断
        const filteredBooks = wbData.books.map((b, index) => ({...b, originalIndex: index}))
            .filter(b => {
                const matchScope = (b.scope === currentWbTab) || (!b.scope && currentWbTab === 'local'); // 兼容旧数据
                const matchSearch = b.title.toLowerCase().includes(searchTerm);
                return b.group === group && matchScope && matchSearch;
            });
        
        if (filteredBooks.length === 0) return; // 如果这个分组下没书就不显示分组名

        groupDiv.innerHTML = `
            <div class="wb-group-title" onclick="toggleGroup(this)">
                <span>📁 ${group}</span><span>${filteredBooks.length}</span>
            </div>
            <div class="wb-group-content">
                ${filteredBooks.map(b => `
                    <div class="wb-item" onclick="editBook(${b.originalIndex})">
                        <div class="wb-item-name">${b.title} ${b.mode==='keyword'?`<small style='color:#ff6b6b; font-size:10px;'>[关键词: ${b.keyword}]</small>`:''}</div>
                        <div class="wb-item-text">${b.content.substring(0,50)}...</div>
                    </div>`).join('')}
            </div>`;
        container.appendChild(groupDiv);
    });
}

        function toggleGroup(el) { el.nextElementSibling.classList.toggle('collapsed'); }
        
        function showWbModal() {
    editingBookIndex = null; // 重置为新建模式
    document.getElementById('wb-modal').style.display = "block";
    document.getElementById('wb-group-select').innerHTML = wbData.groups.map(g => `<option value="${g}">${g}</option>`).join('');
    
    // 清空输入框
    document.getElementById('new-wb-title').value = "";
    document.getElementById('new-wb-content').value = "";
    document.getElementById('new-wb-keyword').value = "";
    switchWbMode('global');
}

// 新增：编辑函数
function editBook(index) {
    editingBookIndex = index;
    const book = wbData.books[index];
    
    document.getElementById('wb-modal').style.display = "block";
    document.getElementById('wb-group-select').innerHTML = wbData.groups.map(g => `<option value="${g}">${g}</option>`).join('');
    
    // 填入已有数据
    document.getElementById('new-wb-title').value = book.title;
    document.getElementById('new-wb-content').value = book.content;
    document.getElementById('new-wb-keyword').value = book.keyword || "";
    document.getElementById('wb-group-select').value = book.group;
    
    // 这一步很重要：如果是编辑，我们需要暂时让当前标签页匹配这本书的属性
    if(book.scope) {
        currentWbTab = book.scope;
        document.getElementById('tab-scope-global').classList.toggle('active', book.scope === 'global');
        document.getElementById('tab-scope-local').classList.toggle('active', book.scope === 'local');
    }
    
    switchWbMode(book.mode || 'global');
}

// 新增：删除函数（如果你想顺便加个删除功能，可以加个按钮调用这个）

        function saveNewBook() {
    const title = document.getElementById('new-wb-title').value;

        mode: currentWbMode, 
        keyword: currentWbMode === 'keyword' ? keyword : null,
        scope: currentWbTab // 新增：保存当前属于哪个选项卡（全局/局部）

    }

        function updateTime() {
            const now = new Date();
            const weeks = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            document.getElementById('date-display').innerText = `${now.getMonth()+1}月${now.getDate()}日 ${weeks[now.getDay()]}`;
            document.getElementById('clock-display').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const start = new Date(now.getFullYear(), 0, 1);
            const end = new Date(now.getFullYear() + 1, 0, 1);
            const totalDays = (end - start) / 86400000;
            const remainDays = Math.ceil((end - now) / 86400000);
            document.getElementById('year-days').innerText = remainDays;
            document.getElementById('year-bar').style.width = (remainDays / totalDays * 100) + "%";
            const passedSecs = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
            const dayPercent = Math.floor(((86400 - passedSecs) / 86400) * 100);
            document.getElementById('day-percent').innerText = dayPercent;
            document.getElementById('day-bar').style.width = dayPercent + "%";
        }

// 切换背景设置的选项卡
function switchBgTab(target, mode) {
    // target 是 'phone' 或 'widget'，mode 是 'file' 或 'url'
    const tabFile = document.getElementById(`tab-${target}-file`);
    const tabUrl = document.getElementById(`tab-${target}-url`);
    const contentFile = document.getElementById(`content-${target}-file`);
    const contentUrl = document.getElementById(`content-${target}-url`);

    if (mode === 'file') {
        tabFile.classList.add('active');
        tabUrl.classList.remove('active');
        contentFile.classList.add('active');
        contentUrl.classList.remove('active');
    } else {
        tabFile.classList.remove('active');
        tabUrl.classList.add('active');
        contentFile.classList.remove('active');
        contentUrl.classList.add('active');
    }
}

        async function fetchModels() {
            const url = document.getElementById('api-url').value.replace(/\/$/, "");
            const key = document.getElementById('api-key').value;
            const modelSelect = document.getElementById('model-select');
            if(!url || !key) { alert("请先填写 URL 和密钥"); return; }
            modelSelect.innerHTML = '<option>拉取中...</option>';
            try {
                const response = await fetch(`${url}/models`, {
                    headers: { 'Authorization': `Bearer ${key}` }
                });
                const data = await response.json();
                modelSelect.innerHTML = '';
                const modelList = data.data || data;
                modelList.forEach(m => {
                    let opt = document.createElement('option');
                    opt.value = m.id; opt.innerText = m.id;
                    modelSelect.appendChild(opt);
                });
            } catch (err) { alert("拉取失败"); modelSelect.innerHTML = '<option value="">拉取失败</option>'; }
        }

        function exportFullData() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                data[key] = localStorage.getItem(key);
            }
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `shushu_phone_backup_${date}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importFullData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(confirm("导入将覆盖当前所有数据，确定吗？")) {
                        localStorage.clear();
                        Object.keys(data).forEach(key => {
                            localStorage.setItem(key, data[key]);
                        });
                        location.reload();
                    }
                } catch (err) { alert("导入失败"); }
            };
            reader.readAsText(file);
        }

        let silentAudio = null;
let wakeLock = null;

async function toggleKeepAlive(enabled) {
    if (enabled) {
        try {
            // 1. 开启静音音频保活
            if (!silentAudio) {
                const silentData = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA== ";
                silentAudio = new Audio(silentData);
                silentAudio.loop = true;
            }
            await silentAudio.play();

            // 2. 开启屏幕/CPU唤醒锁定 (Wake Lock)
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }

            // 3. 注册媒体卡片
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: '书书小手机 - 后台守护中',
                    artist: 'AI 聊天运行中',
                    album: '请勿在多任务界面划掉浏览器',
                    artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/3670/3670044.png', sizes: '512x512', type: 'image/png' }]
                });
            }

            localStorage.setItem('background_keep_alive', 'true');
            console.log("高级保活已开启");
        } catch (err) {
            alert("保活开启失败，请确保您点击过屏幕后再打开开关。");
            document.getElementById('keep-alive-toggle').checked = false;
        }
    } else {
        if (silentAudio) silentAudio.pause();
        if (wakeLock) wakeLock.release().then(() => wakeLock = null);
        localStorage.setItem('background_keep_alive', 'false');
    }
}

async function toggleNotifications(enabled) {
    if (enabled) {
        // 1. 检查浏览器支持情况
        if (!("Notification" in window)) {
            alert("抱歉，您的浏览器不支持系统通知。");
            document.getElementById('notification-toggle').checked = false;
            return;
        }

        // 2. 申请权限
        const permission = await Notification.requestPermission();
        
        if (permission === "granted") {
            localStorage.setItem('allow_notifications', 'true');
            
            // 3. 核心：立即触发订阅流程，确保获取 Web Push 所需的 Key
            await subscribeUser(); 
            
            // 4. 发送一条即时的测试通知，确认管道通畅
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification('系统提示', {
                    body: '后台消息通知已成功开启！即使关闭网页，AI回复时也会弹窗提醒。',
                    icon: 'https://cdn-icons-png.flaticon.com/512/3670/3670044.png',
                    badge: 'https://cdn-icons-png.flaticon.com/512/3670/3670044.png',
                    vibrate: [200, 100, 200]
                });
            });
            console.log("通知功能已完全激活");
        } else {
            alert("权限被拒绝！请点击地址栏左侧的设置按钮，手动允许“通知”权限，否则无法接收离线消息。");
            document.getElementById('notification-toggle').checked = false;
            localStorage.setItem('allow_notifications', 'false');
        }
    } else {
        // 关闭逻辑
        localStorage.setItem('allow_notifications', 'false');
        localStorage.removeItem('web_push_subscription'); // 清除订阅信息
        alert("已关闭后台通知。");
    }
}

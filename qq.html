<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeChat AI Plus</title>
    <style>
        :root {
            --bg-gray: #ededed;
            --border-color: #e5e5e5;
            --wechat-green: #07c160;
            --text-main: #191919;
            --text-sub: #999999;
            --blue-link: #576b95;
            --accent-color: #ff6b6b;
            --glass-purple: rgba(235, 220, 255, 0.7);
            --z-chat: 100;
            --z-settings: 200;
            --z-moments: 300;
            --z-sub-page: 400;
            --z-editor: 500;
            --z-model-sel: 600; 
            --z-modal: 2000;
        }
        .page { will-change: transform, opacity; backface-visibility: hidden; perspective: 1000px; }
        #message-container { background-size: cover; background-position: center; background-repeat: no-repeat; contain: strict; }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; background: var(--bg-gray); color: var(--text-main); overflow: hidden; }
        .page { display: none; flex-direction: column; height: 100%; position: absolute; width: 100%; top: 0; left: 0; background: var(--bg-gray); }
        .page.active { display: flex; }
        .header { height: 50px; background: var(--bg-gray); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 17px; font-weight: 500; border-bottom: 0.5px solid var(--border-color); flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 60px; -webkit-overflow-scrolling: touch; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 55px; background: #f7f7f7; border-top: 0.5px solid #ccc; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 50; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #333; font-size: 10px; cursor: pointer; }
        .tab-item.active { color: var(--wechat-green); }
        .tab-icon { font-size: 22px; margin-bottom: 2px; }

        .list-group { background: white; margin-top: 10px; }
        .list-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 0.5px solid var(--border-color); cursor: pointer; }
        .list-item:active { background: #f2f2f2; }
        .avatar { width: 45px; height: 45px; border-radius: 6px; margin-right: 12px; background: #5c6bc0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .info { flex: 1; min-width: 0; }
        .name { font-size: 16px; }

        .group-header { background: #fff; padding: 12px 16px; display: flex; align-items: center; font-size: 14px; color: #888; border-bottom: 0.5px solid var(--border-color); cursor: pointer; }
        .group-arrow { margin-right: 10px; transition: transform 0.2s; font-size: 12px; }
        .group-arrow.collapsed { transform: rotate(-90deg); }

        .wechat-chat-item { display: flex; align-items: center; padding: 12px 16px; background: white; position: relative; border-bottom: 0.5px solid #f0f0f0; }
        .wechat-chat-item:active { background: #f2f2f2; }
        .wechat-chat-item .chat-avatar { width: 48px; height: 48px; border-radius: 4px; margin-right: 12px; flex-shrink: 0; background: #5c6bc0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; overflow: hidden; }
        .wechat-chat-item .chat-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
        .wechat-chat-item .chat-top { display: flex; justify-content: space-between; align-items: center; }
        .wechat-chat-item .chat-nickname { font-size: 16px; color: #000; font-weight: 500; }
        .wechat-chat-item .chat-preview { font-size: 13.5px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .me-header { background: white; padding: 40px 20px; display: flex; align-items: center; gap: 15px; }
        .me-avatar { width: 64px; height: 64px; border-radius: 8px; background: #eee; overflow: hidden; flex-shrink: 0; cursor: pointer; }
        .me-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .me-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; cursor: pointer; }
        .me-wxid { font-size: 14px; color: var(--text-sub); cursor: pointer; }

        #message-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg { display: flex; max-width: 85%; align-items: flex-start; position: relative; }
        .msg.self { align-self: flex-end; flex-direction: row-reverse; }
        
        /* 语音条基础样式 */
        .voice-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
        .msg.self .voice-wrap { align-items: flex-end; }

        .voice-bar {
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            background: #fff; padding: 10px 15px; border-radius: 6px;
            min-width: 100px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            position: relative;
        }
        .msg.self .voice-bar { background: #95ec69; }
        
        .voice-icon { font-size: 16px; transform: rotate(180deg); }
        .msg.self .voice-icon { transform: rotate(0deg); }
        
        .translate-trigger { font-size: 11px; color: var(--blue-link); cursor: pointer; padding: 2px 5px; }
        .translated-content {
            display: none; background: rgba(0,0,0,0.05); padding: 8px 12px;
            border-radius: 6px; font-size: 14px; color: #333; margin-top: 5px;
            max-width: 100%; word-break: break-all;
        }
        .translated-content.active { display: block; }

        .input-bar { background: #f7f7f7; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 0.5px solid #ccc; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .input-bar input { flex: 1; border: none; padding: 10px; border-radius: 4px; outline: none; }
        .btn-green { color: var(--wechat-green); font-weight: bold; cursor: pointer; border:none; background:none; }
        .typing-status { font-size: 11px; color: #555; font-weight: normal; display: none; }
    </style>
</head>
<body>

    <div id="tab-chat" class="page active">
        <div class="header">微信</div>
        <div class="content" id="chat-session-list"></div>
    </div>

    <div id="tab-contacts" class="page">
        <div class="header">通讯录</div>
        <div class="content" id="contact-list"></div>
    </div>

    <div id="tab-me" class="page">
        <div class="header"></div>
        <div class="content">
            <div class="me-header">
                <div class="me-avatar" id="my-avatar-display" onclick="changeMyAvatar()"></div>
                <div class="me-info">
                    <div class="me-name" id="my-name-display" onclick="changeMyName()">我</div>
                    <div class="me-wxid" id="my-wxid-display" onclick="changeMyWxid()">微信号：wxid_001</div>
                </div>
            </div>
            <div class="list-group">
                <div class="list-item" onclick="openApiConfig()">API 与模型设置</div>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('tab-chat', this)">💬<span>微信</span></div>
        <div class="tab-item" onclick="switchTab('tab-contacts', this)">👥<span>通讯录</span></div>
        <div class="tab-item" onclick="switchTab('tab-me', this)">👤<span>我</span></div>
    </div>

    <div id="chat-page" class="page">
        <div class="header">
            <span onclick="closeChat()">〈 返回</span>
            <div id="chat-title"></div>
            <span onclick="openSettings()">···</span>
        </div>
        <div id="message-container"></div>
        <div class="input-bar">
            <input type="text" id="msg-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter') sendMsg()">
            <div style="font-size: 22px; cursor: pointer;" onclick="getAiReply()">🎙️</div>
            <button class="btn-green" onclick="sendMsg()">发送</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="header"><span onclick="closeSettings()">〈 返回</span><span>聊天信息</span><span></span></div>
        <div class="content">
            <div class="list-group">
                <div class="list-item" onclick="editVoiceId()"><div class="info">音色 ID (Voice ID)</div><div id="settings-voice-display" style="color:#888"></div><span>></span></div>
                <div class="list-item" onclick="changeChatBackground()">聊天背景</div>
            </div>
        </div>
    </div>

    <script>
        let currentFriendName = "";
        let friends = JSON.parse(localStorage.getItem('qq_friends')) || [{ name: 'AI 小助手', initial: 'AI', lastMsg: '', persona: '可爱、开朗', freq: 0, lastMoment: 0, avatarUrl: '', mountedBooks: [], group: '我的好友', voiceId: 'cherry' }];
        let chatHistories = JSON.parse(localStorage.getItem('qq_history')) || {};
        let aiConfig = JSON.parse(localStorage.getItem('ai_config') || '{"url":"","key":"","model":"gpt-3.5-turbo"}');
        let myInfo = JSON.parse(localStorage.getItem('my_info')) || { name: '我', wxid: 'wxid_001', avatar: '' };

        function saveData() {
            localStorage.setItem('qq_friends', JSON.stringify(friends));
            localStorage.setItem('qq_history', JSON.stringify(chatHistories));
        }

        // --- 核心：语音播放与转文字 ---
        async function playVoice(text, btn) {
            const mm = JSON.parse(localStorage.getItem('minimax_config') || '{}');
            const friend = friends.find(f => f.name === currentFriendName);
            if (!mm.key || !mm.groupId) return alert("请先在设置中配置 MiniMax GroupID 和 Key");

            const original = btn.innerHTML;
            btn.innerHTML = "⌛...";
            
            try {
                const url = `${mm.url || 'https://api.minimax.chat/v1/text_to_speech'}?group_id=${mm.groupId}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${mm.key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: mm.model || "speech-01-turbo",
                        text: text,
                        voice_setting: { voice_id: friend.voiceId || "cherry" }
                    })
                });
                const blob = await res.blob();
                const audio = new Audio(URL.createObjectURL(blob));
                audio.play();
                btn.innerHTML = "▶ 正在播放";
                audio.onended = () => btn.innerHTML = original;
            } catch (e) {
                alert("语音生成失败");
                btn.innerHTML = original;
            }
        }

        function toggleTranslate(idx) {
            const el = document.getElementById(`trans-${idx}`);
            el.classList.toggle('active');
        }

        function renderMessages() {
            const container = document.getElementById('message-container');
            const history = chatHistories[currentFriendName] || [];
            container.innerHTML = history.map((m, i) => {
                const isSelf = m.type === 'self';
                const friend = friends.find(f => f.name === currentFriendName);
                const av = isSelf ? (myInfo.avatar ? `<img src="${myInfo.avatar}">` : '我') : (friend.avatarUrl ? `<img src="${friend.avatarUrl}">` : friend.initial);
                
                // AI 回复展示为语音条
                if (!isSelf) {
                    return `
                    <div class="msg friend">
                        <div class="avatar">${av}</div>
                        <div class="voice-wrap">
                            <div class="voice-bar" onclick="playVoice('${m.text.replace(/'/g, "\\'")}', this)">
                                <span class="voice-icon">(((</span>
                                <span style="font-size:12px; color:#999;">${Math.min(m.text.length, 60)}''</span>
                            </div>
                            <div class="translate-trigger" onclick="toggleTranslate(${i})">转文字</div>
                            <div id="trans-${i}" class="translated-content">${m.text}</div>
                        </div>
                    </div>`;
                } else {
                    return `
                    <div class="msg self">
                        <div class="avatar">${av}</div>
                        <div style="background:#95ec69; padding:10px; border-radius:6px;">${m.text}</div>
                    </div>`;
                }
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        // --- 其余功能逻辑 ---
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-bar .tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'tab-chat') renderChatList();
        }

        function openChat(n) { currentFriendName = n; document.getElementById('chat-title').innerText = n; document.getElementById('chat-page').classList.add('active'); renderMessages(); }
        function closeChat() { document.getElementById('chat-page').classList.remove('active'); }
        function openSettings() { 
            const f = friends.find(f => f.name === currentFriendName);
            document.getElementById('settings-voice-display').innerText = f.voiceId || "cherry";
            document.getElementById('settings-page').classList.add('active'); 
        }
        function closeSettings() { document.getElementById('settings-page').classList.remove('active'); }
        function editVoiceId() { 
            const f = friends.find(f => f.name === currentFriendName);
            const id = prompt("输入音色 ID:", f.voiceId || "");
            if(id) { f.voiceId = id; saveData(); openSettings(); }
        }

        function renderChatList() {
            const list = document.getElementById('chat-session-list');
            list.innerHTML = friends.map(f => `<div class="wechat-chat-item" onclick="openChat('${f.name}')"><div class="chat-avatar">${f.avatarUrl?`<img src="${f.avatarUrl}">`:f.initial}</div><div class="chat-body"><div class="chat-nickname">${f.name}</div><div class="chat-preview">${f.lastMsg}</div></div></div>`).join('');
        }

        function sendMsg() {
            const val = document.getElementById('msg-input').value.trim();
            if(!val) return;
            if(!chatHistories[currentFriendName]) chatHistories[currentFriendName] = [];
            chatHistories[currentFriendName].push({ type: 'self', text: val });
            friends.find(f => f.name === currentFriendName).lastMsg = val;
            document.getElementById('msg-input').value = ''; renderMessages(); saveData();
        }

        async function getAiReply() {
            if(!aiConfig.key) return alert("请在手机桌面设置 API");
            const friend = friends.find(f => f.name === currentFriendName);
            const history = (chatHistories[currentFriendName] || []).slice(-5).map(m => ({ role: m.type === 'self' ? 'user' : 'assistant', content: m.text }));
            try {
                const res = await fetch(`${aiConfig.url.replace(/\/$/, "")}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${aiConfig.key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: aiConfig.model, messages: [{role: "system", content: `你是${friend.persona}`}, ...history] })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                chatHistories[currentFriendName].push({ type: 'friend', text: reply });
                friend.lastMsg = "[语音消息]";
                renderMessages(); saveData();
            } catch (e) { alert("AI 暂时休息了"); }
        }

        window.onload = () => { renderChatList(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeChat AI Plus</title>
    <style>
        :root {
            --bg-gray: #ededed;
            --border-color: #e5e5e5;
            --wechat-green: #07c160;
            --text-main: #191919;
            --text-sub: #999999;
            --blue-link: #576b95;
            --z-chat: 100;
            --z-settings: 200;
            --z-moments: 300;
            --z-sub-page: 400;
            --z-editor: 500;
            --z-model-sel: 600; /* 模型选择页层级最高 */
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; background: var(--bg-gray); color: var(--text-main); overflow: hidden; }

        /* 基础页面结构 */
        .page { display: none; flex-direction: column; height: 100%; position: absolute; width: 100%; top: 0; left: 0; background: var(--bg-gray); }
        .page.active { display: flex; }
        .header { height: 50px; background: var(--bg-gray); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 17px; font-weight: 500; border-bottom: 0.5px solid var(--border-color); flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 60px; -webkit-overflow-scrolling: touch; }

        /* 底部导航 */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 55px; background: #f7f7f7; border-top: 0.5px solid #ccc; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 50; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #333; font-size: 10px; cursor: pointer; }
        .tab-item.active { color: var(--wechat-green); }
        .tab-icon { font-size: 22px; margin-bottom: 2px; }

        /* 列表样式 */
        .list-group { background: white; margin-top: 10px; }
        .list-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 0.5px solid var(--border-color); cursor: pointer; }
        .list-item:active { background: #f2f2f2; }
        .avatar { width: 45px; height: 45px; border-radius: 6px; margin-right: 12px; background: #5c6bc0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .info { flex: 1; min-width: 0; }
        .name { font-size: 16px; }

        /* 层级管理 */
        #chat-page { z-index: var(--z-chat); }
        #settings-page { z-index: var(--z-settings); }
        #moments-page { z-index: var(--z-moments); background: white; }
        #moments-config-page, #api-config-page, #editor-page, #worldbook-page { z-index: var(--z-sub-page); background: white; }
        #model-selector-page { z-index: var(--z-model-sel); background: white; }

        /* 朋友圈 */
        .moments-header-container { position: relative; height: 260px; background: #333; margin-bottom: 30px; }
        .moments-user { position: absolute; right: 15px; bottom: -15px; display: flex; align-items: center; }
        .moments-user .main-avatar { width: 65px; height: 65px; border-radius: 8px; border: 2px solid white; background: #0099ff; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        .moment-item { display: flex; padding: 15px; border-bottom: 0.5px solid #eee; }

        /* 消息气泡 */
        #message-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: var(--bg-gray); }
        .msg { display: flex; max-width: 85%; }
        .msg.self { align-self: flex-end; flex-direction: row-reverse; }
        .msg .bubble { padding: 10px 12px; border-radius: 6px; font-size: 15px; line-height: 1.4; }
        .msg.friend .bubble { background: white; margin-left: 10px; }
        .msg.self .bubble { background: #95ec69; margin-right: 10px; }
        .input-bar { background: #f7f7f7; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 0.5px solid #ccc; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .input-bar input { flex: 1; border: none; padding: 10px; border-radius: 4px; outline: none; }

        .btn-green { color: var(--wechat-green); font-weight: bold; cursor: pointer; border:none; background:none; }
        .radio-item { display: flex; justify-content: space-between; padding: 12px 16px; background:white; border-bottom: 0.5px solid #eee; }

        /* 正在输入状态 */
        .typing-status { font-size: 11px; color: #555; font-weight: normal; display: none; }
    </style>
</head>
<body>

    <!-- 底部四个主页 -->
    <div id="tab-chat" class="page active">
        <div class="header">微信</div>
        <div class="content" id="chat-session-list"></div>
    </div>
    <div id="tab-contacts" class="page">
        <div class="header"><span>通讯录</span><span class="btn-green" onclick="addFriend()">添加</span></div>
        <div class="content" id="contact-list"></div>
    </div>
    <div id="tab-discover" class="page">
        <div class="header">发现</div>
        <div class="content"><div class="list-group"><div class="list-item" onclick="openMoments()">🎡 朋友圈</div></div></div>
    </div>
    <div id="tab-me" class="page">
        <div class="header">我</div>
        <div class="content"><div class="list-group"><div class="list-item" onclick="openApiConfig()"><div class="info">API 与模型设置</div><span>></span></div></div></div>
    </div>

    <!-- 底部导航 -->
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('tab-chat', this)">💬<span>微信</span></div>
        <div class="tab-item" onclick="switchTab('tab-contacts', this)">👥<span>通讯录</span></div>
        <div class="tab-item" onclick="switchTab('tab-discover', this)">🧭<span>发现</span></div>
        <div class="tab-item" onclick="switchTab('tab-me', this)">👤<span>我</span></div>
    </div>

    <!-- 聊天详情 -->
    <div id="chat-page" class="page">
        <div class="header">
            <span onclick="closeChat()">〈 返回</span>
            <div style="text-align: center; line-height: 1.2;">
                <div id="chat-title"></div>
                <div id="chat-typing" class="typing-status">正在输入中...</div>
            </div>
            <span style="font-size:24px;" onclick="openSettings()">···</span>
        </div>
        <div id="message-container"></div>
        <div class="input-bar">
            <button class="btn-green" style="font-size:12px;" onclick="getAiReply()">AI回复</button>
            <input type="text" id="msg-input" placeholder="输入消息...">
            <button class="btn-green" onclick="sendMsg()">发送</button>
        </div>
    </div>

    <!-- 聊天设置 -->
    <div id="settings-page" class="page">
        <div class="header"><span onclick="closeSettings()">〈 返回</span><span>聊天信息</span><span></span></div>
        <div class="content">
            <div class="list-group" style="padding: 20px; display: flex; gap: 15px;">
                <div style="text-align:center;">
                    <div id="settings-avatar" class="avatar" style="margin-right:0; cursor:pointer;" onclick="changeAvatar()"></div>
                    <div id="settings-name" style="font-size:12px;color:#888;margin-top:5px;"></div>
                </div>
            </div>
            <div class="list-group">
                <div class="list-item" onclick="renameCurrentFriend()"><div class="info">备注名</div><div id="settings-nick-display" style="color:#888"></div><span>></span></div>
                <div class="list-item" onclick="openPersonaEditor()"><div class="info">AI 人设 (Prompt)</div><span>></span></div>
                <div class="list-item" onclick="openMomentsConfig()"><div class="info">朋友圈设置</div><span>></span></div>
                <div class="list-item" onclick="openWorldBookSelector()"><div class="info">挂载世界书</div><span>></span></div>
            </div>
            <div class="list-group"><div class="list-item" onclick="deleteFriend()" style="color:#fa5151; justify-content:center; font-weight:bold;">删除好友</div></div>
        </div>
    </div>

    <!-- 世界书选择页 -->
    <div id="worldbook-page" class="page">
        <div class="header"><span onclick="closeWorldBookSelector()">〈 返回</span><span>挂载世界书</span><span class="btn-green" onclick="saveWorldBookConfig()">完成</span></div>
        <div class="content" id="worldbook-list-container">
            <!-- 动态生成世界书列表 -->
        </div>
    </div>

    <!-- 朋友圈设置 -->
    <div id="moments-config-page" class="page">
        <div class="header"><span onclick="closeMomentsConfig()">〈 返回</span><span>朋友圈设置</span><span class="btn-green" onclick="saveMomentsConfig()">完成</span></div>
        <div class="content">
            <div style="padding:15px; font-size:13px; color:#888;">自动发朋友圈频率</div>
            <div id="frequency-options">
                <div class="radio-item" onclick="setFreq(10)">10分钟一次 <input type="radio" name="freq" value="10"></div>
                <div class="radio-item" onclick="setFreq(20)">20分钟一次 <input type="radio" name="freq" value="20"></div>
                <div class="radio-item" onclick="setFreq(30)">30分钟一次 <input type="radio" name="freq" value="30"></div>
                <div class="radio-item" onclick="setFreq(0)">不自动发送 <input type="radio" name="freq" value="0"></div>
            </div>
            <div class="list-group"><div class="list-item"><span>自定义(分):</span><input type="number" id="custom-freq" style="border:none;flex:1;text-align:right;"></div></div>
            
            <div class="list-group" style="margin-top:30px;">
                <div class="list-item" onclick="forceTriggerMoment()" style="justify-content:center; color:var(--blue-link); font-weight:500;">
                    ✨ 强制让 AI 发一条朋友圈
                </div>
            </div>
        </div>
    </div>

    <!-- 模型选择页 -->
    <div id="model-selector-page" class="page">
        <div class="header"><span onclick="closeModelSelector()">〈 取消</span><span>选择模型</span><span></span></div>
        <div class="content" id="model-list-container">
            <!-- 动态生成模型列表 -->
        </div>
    </div>

    <!-- API 设置 -->
    <div id="api-config-page" class="page">
        <div class="header"><span onclick="closeApiConfig()">〈 取消</span><span>API 设置</span><span class="btn-green" onclick="saveApiConfig()">保存</span></div>
        <div class="content">
            <div class="list-group">
                <div class="list-item"><span>地址:</span><input type="text" id="api-url" style="border:none;flex:1;text-align:right;"></div>
                <div class="list-item"><span>Key:</span><input type="password" id="api-key" style="border:none;flex:1;text-align:right;"></div>
                <div class="list-item" onclick="fetchModels()">
                    <div class="info">当前模型: <b id="current-model-display"></b></div>
                    <span class="btn-green" style="font-size:12px">拉取并选择</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 朋友圈主页 -->
    <div id="moments-page" class="page">
        <div class="header" style="background:transparent; position:absolute; border:none; color:white; z-index:10;">
            <span onclick="closeMoments()">〈 发现</span>
            <span onclick="postMoment()" style="font-size:20px;">📷</span>
        </div>
        <div class="content" style="padding-bottom:0">
            <div class="moments-header-container">
                <div style="width:100%; height:100%; background: #444;"></div>
                <div class="moments-user"><span style="color:white; margin-right:10px;">我</span><div class="main-avatar">ME</div></div>
            </div>
            <div id="moments-list"></div>
        </div>
    </div>

    <!-- 文案编辑器 -->
    <div id="editor-page" class="page">
        <div class="header"><span onclick="closePersonaEditor()">取消</span><span>编辑</span><span class="btn-green" onclick="savePersona()">完成</span></div>
        <textarea id="persona-input" style="width:100%; height:100%; border:none; padding:15px; font-size:16px; outline:none; box-sizing:border-box;"></textarea>
    </div>

    <!-- 隐藏的图片上传控件 -->
    <input type="file" id="avatar-upload" style="display:none" accept="image/*" onchange="handleAvatarUpload(this)">

    <script>
        // --- 核心数据 ---
        let currentFriendName = "";
        let friends = JSON.parse(localStorage.getItem('qq_friends')) || [{ name: 'AI 小助手', initial: 'AI', lastMsg: '', persona: '可爱、开朗', freq: 0, lastMoment: 0, avatarUrl: '', mountedBooks: [] }];
        let chatHistories = JSON.parse(localStorage.getItem('qq_history')) || {};
        let moments = JSON.parse(localStorage.getItem('qq_moments')) || [];
        let aiConfig = JSON.parse(localStorage.getItem('ai_config') || '{"url":"","key":"","model":"gpt-3.5-turbo"}');

        function saveData() {
            localStorage.setItem('qq_friends', JSON.stringify(friends));
            localStorage.setItem('qq_history', JSON.stringify(chatHistories));
            localStorage.setItem('qq_moments', JSON.stringify(moments));
            localStorage.setItem('ai_config', JSON.stringify(aiConfig));
        }

        // --- 导航 ---
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-bar .tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.page').forEach(p => { if(!['chat-page','settings-page','moments-page','moments-config-page','api-config-page','editor-page','model-selector-page','worldbook-page'].includes(p.id)) p.classList.remove('active')});
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'tab-chat') renderChatList();
            if(tabId === 'tab-contacts') renderContactList();
        }

        // --- 头像修改功能 ---
        function changeAvatar() {
            const choice = confirm("点击确定：输入图片URL\n点击取消：从本地相册选择");
            if (choice) {
                const url = prompt("请输入图片URL:");
                if (url) {
                    const friend = friends.find(f => f.name === currentFriendName);
                    friend.avatarUrl = url;
                    saveData();
                    updateSettingsAvatarDisplay(friend);
                    renderChatList();
                    renderContactList();
                }
            } else {
                document.getElementById('avatar-upload').click();
            }
        }

        function handleAvatarUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const friend = friends.find(f => f.name === currentFriendName);
                    friend.avatarUrl = e.target.result;
                    saveData();
                    updateSettingsAvatarDisplay(friend);
                    renderChatList();
                    renderContactList();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateSettingsAvatarDisplay(friend) {
            const div = document.getElementById('settings-avatar');
            if (friend.avatarUrl) {
                div.innerHTML = `<img src="${friend.avatarUrl}">`;
            } else {
                div.innerHTML = friend.initial;
            }
        }

        // --- 世界书挂载功能 ---
        function openWorldBookSelector() {
            const friend = friends.find(f => f.name === currentFriendName);
            const mounted = friend.mountedBooks || [];
            // 从 localStorage 获取世界书应用的数据（假设键名为 world_books）
            const allBooks = JSON.parse(localStorage.getItem('world_books') || '[]');
            
            const container = document.getElementById('worldbook-list-container');
            container.innerHTML = '';
            
            if (allBooks.length === 0) {
                container.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">暂无世界书，请先在世界书App中添加</div>';
            } else {
                allBooks.forEach(book => {
                    const isChecked = mounted.includes(book.title);
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `
                        <div class="info">
                            <div class="name">${book.title}</div>
                            <div style="font-size:12px;color:#999">${book.content ? book.content.substring(0,30)+'...' : '暂无内容'}</div>
                        </div>
                        <input type="checkbox" class="wb-checkbox" value="${book.title}" ${isChecked ? 'checked' : ''}>
                    `;
                    div.onclick = (e) => {
                        if(e.target.type !== 'checkbox') {
                            const cb = div.querySelector('input');
                            cb.checked = !cb.checked;
                        }
                    };
                    container.appendChild(div);
                });
            }
            document.getElementById('worldbook-page').classList.add('active');
        }

        function closeWorldBookSelector() { document.getElementById('worldbook-page').classList.remove('active'); }

        function saveWorldBookConfig() {
            const friend = friends.find(f => f.name === currentFriendName);
            const checkboxes = document.querySelectorAll('.wb-checkbox');
            const selected = [];
            checkboxes.forEach(cb => { if(cb.checked) selected.push(cb.value); });
            friend.mountedBooks = selected;
            saveData();
            alert("挂载成功！");
            closeWorldBookSelector();
        }

        // --- API & 模型选择逻辑 ---
        function openApiConfig() {
            document.getElementById('api-url').value = aiConfig.url;
            document.getElementById('api-key').value = aiConfig.key;
            document.getElementById('current-model-display').innerText = aiConfig.model || "未设置";
            document.getElementById('api-config-page').classList.add('active');
        }
        function closeApiConfig() { document.getElementById('api-config-page').classList.remove('active'); }
        function saveApiConfig() {
            aiConfig.url = document.getElementById('api-url').value;
            aiConfig.key = document.getElementById('api-key').value;
            saveData(); alert("已保存"); closeApiConfig();
        }

        async function fetchModels() {
            const url = document.getElementById('api-url').value.replace(/\/$/, "");
            const key = document.getElementById('api-key').value;
            if(!url || !key) return alert("请先填写地址和Key");
            
            try {
                const res = await fetch(`${url}/models`, { headers: { 'Authorization': `Bearer ${key}` }});
                const data = await res.json();
                if(data.data && Array.isArray(data.data)) {
                    showModelSelector(data.data.map(m => m.id));
                } else { alert("获取列表失败"); }
            } catch (e) {
                const manual = prompt("拉取失败，请输入模型名:");
                if(manual) { aiConfig.model = manual; document.getElementById('current-model-display').innerText = manual; }
            }
        }

        function showModelSelector(modelIds) {
            const container = document.getElementById('model-list-container');
            container.innerHTML = '';
            modelIds.forEach(id => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<div class="info">${id}</div>${id === aiConfig.model ? '<span style="color:var(--wechat-green)">✔</span>' : ''}`;
                div.onclick = () => {
                    aiConfig.model = id;
                    document.getElementById('current-model-display').innerText = id;
                    saveData();
                    closeModelSelector();
                };
                container.appendChild(div);
            });
            document.getElementById('model-selector-page').classList.add('active');
        }
        function closeModelSelector() { document.getElementById('model-selector-page').classList.remove('active'); }

        // --- 朋友圈设置与强制发帖 ---
        function openMomentsConfig() {
            const friend = friends.find(f => f.name === currentFriendName);
            const freq = friend.freq || 0;
            const radios = document.getElementsByName('freq');
            radios.forEach(r => { if(parseInt(r.value) === freq) r.checked = true; });
            document.getElementById('custom-freq').value = (freq !== 10 && freq !== 20 && freq !== 30 && freq !== 0) ? freq : "";
            document.getElementById('moments-config-page').classList.add('active');
        }
        function closeMomentsConfig() { document.getElementById('moments-config-page').classList.remove('active'); }
        function setFreq(v) { document.querySelector(`input[name="freq"][value="${v}"]`).checked = true; }
        
        function saveMomentsConfig() {
            const friend = friends.find(f => f.name === currentFriendName);
            const custom = document.getElementById('custom-freq').value;
            if(custom) friend.freq = parseInt(custom);
            else {
                const selected = document.querySelector('input[name="freq"]:checked');
                friend.freq = selected ? parseInt(selected.value) : 0;
            }
            friend.lastMoment = Date.now();
            saveData(); closeMomentsConfig();
        }

        async function forceTriggerMoment() {
            const friend = friends.find(f => f.name === currentFriendName);
            if(!aiConfig.key) return alert("请先配置API Key");
            const originalText = document.querySelector('#moments-config-page .list-item[onclick="forceTriggerMoment()"]').innerText;
            document.querySelector('#moments-config-page .list-item[onclick="forceTriggerMoment()"]').innerText = "正在发布中...";
            await triggerAiMoment(friend);
            document.querySelector('#moments-config-page .list-item[onclick="forceTriggerMoment()"]').innerText = originalText;
            alert("发布成功！请去朋友圈查看。");
        }

        // --- 核心 AI 朋友圈生成逻辑 ---
        async function checkAndGenerateAiMoments() {
            const now = Date.now();
            for (let friend of friends) {
                if (friend.freq > 0) {
                    const elapsedMin = (now - (friend.lastMoment || 0)) / (1000 * 60);
                    if (elapsedMin >= friend.freq) {
                        await triggerAiMoment(friend);
                        friend.lastMoment = now;
                        saveData();
                    }
                }
            }
        }

        async function triggerAiMoment(friend) {
            if(!aiConfig.key) return;
            try {
                const res = await fetch(`${aiConfig.url.replace(/\/$/, "")}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${aiConfig.key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: aiConfig.model,
                        messages: [{role: "system", content: `你的人设是：${friend.persona}。请写一条符合你性格的朋友圈文案，不需要表情符号，字数30字内。不要前缀。`}]
                    })
                });
                const data = await res.json();
                const content = data.choices[0].message.content.trim();
                const now = new Date();
                moments.push({ name: friend.name, text: content, time: `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}` });
                saveData();
                if(document.getElementById('moments-page').classList.contains('active')) renderMoments();
            } catch (e) { console.error("AI发布失败", e); }
        }

        setInterval(checkAndGenerateAiMoments, 60000);

        // --- 基础逻辑 (聊天、列表渲染等) ---
        function renderChatList() {
            const list = document.getElementById('chat-session-list'); list.innerHTML = '';
            friends.filter(f => f.lastMsg).forEach(f => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.onclick = () => openChat(f.name);
                const avHtml = f.avatarUrl ? `<img src="${f.avatarUrl}">` : f.initial;
                item.innerHTML = `<div class="avatar">${avHtml}</div><div class="info"><div class="name">${f.name}</div><div style="font-size:13px;color:#999">${f.lastMsg}</div></div>`;
                list.appendChild(item);
            });
        }
        function renderContactList() {
            const list = document.getElementById('contact-list'); list.innerHTML = '';
            friends.forEach(f => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.onclick = () => openChat(f.name);
                const avHtml = f.avatarUrl ? `<img src="${f.avatarUrl}">` : f.initial;
                item.innerHTML = `<div class="avatar">${avHtml}</div><div class="info"><div class="name">${f.name}</div></div>`;
                list.appendChild(item);
            });
        }
        function openChat(name) { currentFriendName = name; document.getElementById('chat-title').innerText = name; document.getElementById('chat-page').classList.add('active'); renderMessages(); }
        function closeChat() { document.getElementById('chat-page').classList.remove('active'); renderChatList(); }
        function renderMessages() {
            const container = document.getElementById('message-container'); container.innerHTML = '';
            const friend = friends.find(f => f.name === currentFriendName);
            const history = chatHistories[currentFriendName] || [];
            history.forEach(m => {
                const div = document.createElement('div'); div.className = `msg ${m.type}`;
                const avHtml = (m.type === 'friend' && friend.avatarUrl) ? `<img src="${friend.avatarUrl}">` : (m.type==='self'?'我':friend.initial);
                div.innerHTML = `<div class="avatar" style="width:35px;height:35px;font-size:12px;background:${m.type==='self'?'#07c160':'#ccc'}">${avHtml}</div><div class="bubble">${m.text}</div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }
        function sendMsg() {
            const input = document.getElementById('msg-input'); if(!input.value.trim()) return;
            const text = input.value.trim();
            if(!chatHistories[currentFriendName]) chatHistories[currentFriendName] = [];
            chatHistories[currentFriendName].push({ type: 'self', text });
            friends.find(f => f.name === currentFriendName).lastMsg = text;
            input.value = ''; saveData(); renderMessages();
        }
        function openSettings() {
            const friend = friends.find(f => f.name === currentFriendName);
            updateSettingsAvatarDisplay(friend);
            document.getElementById('settings-name').innerText = friend.name;
            document.getElementById('settings-nick-display').innerText = friend.name;
            document.getElementById('settings-page').classList.add('active');
        }
        function closeSettings() { document.getElementById('settings-page').classList.remove('active'); }
        function openMoments() { document.getElementById('moments-page').classList.add('active'); renderMoments(); }
        function closeMoments() { document.getElementById('moments-page').classList.remove('active'); }
        function renderMoments() {
            const list = document.getElementById('moments-list'); list.innerHTML = '';
            moments.slice().reverse().forEach(m => {
                const div = document.createElement('div'); div.className = 'moment-item';
                div.innerHTML = `<div class="avatar" style="width:40px;height:40px;">${m.name[0]}</div><div class="info"><div class="name" style="color:var(--blue-link)">${m.name}</div><div style="margin:5px 0;">${m.text}</div><div style="font-size:12px;color:#999">${m.time}</div></div>`;
                list.appendChild(div);
            });
        }
        function postMoment() {
            const t = prompt("这一刻的想法...");
            if(t) { moments.push({ name: '我', text: t, time: '刚刚' }); saveData(); renderMoments(); }
        }
        function addFriend() {
            const n = prompt("昵称:");
            if(n) { friends.push({ name: n, initial: n[0].toUpperCase(), lastMsg: '', persona: '普通人', freq: 0, lastMoment: Date.now(), avatarUrl:'', mountedBooks:[] }); saveData(); renderContactList(); }
        }
        function deleteFriend() { if(confirm("删除该好友？")) { friends = friends.filter(f => f.name !== currentFriendName); delete chatHistories[currentFriendName]; saveData(); closeSettings(); closeChat(); renderContactList(); } }
        function renameCurrentFriend() { 
            const n = prompt("修改备注:", currentFriendName); 
            if(n) { 
                const f = friends.find(f => f.name === currentFriendName);
                chatHistories[n] = chatHistories[currentFriendName]; delete chatHistories[currentFriendName];
                f.name = n; f.initial = n[0].toUpperCase(); currentFriendName = n; saveData(); openSettings();
            }
        }
        function openPersonaEditor() { document.getElementById('persona-input').value = friends.find(f => f.name === currentFriendName).persona; document.getElementById('editor-page').classList.add('active'); }
        function closePersonaEditor() { document.getElementById('editor-page').classList.remove('active'); }
        function savePersona() { friends.find(f => f.name === currentFriendName).persona = document.getElementById('persona-input').value; saveData(); closePersonaEditor(); }

        async function getAiReply() {
            if(!aiConfig.key) return alert("请在'我'中配置API");
            const friend = friends.find(f => f.name === currentFriendName);
            const history = (chatHistories[currentFriendName] || []).slice(-10).map(m => ({ role: m.type === 'self' ? 'user' : 'assistant', content: m.text }));
            
            // 组装世界书背景
            let worldBookPrompt = "";
            const allBooks = JSON.parse(localStorage.getItem('world_books') || '[]');
            if (friend.mountedBooks && friend.mountedBooks.length > 0) {
                const matched = allBooks.filter(b => friend.mountedBooks.includes(b.title));
                if (matched.length > 0) {
                    worldBookPrompt = "\n世界设定背景知识：\n" + matched.map(b => `[${b.title}]: ${b.content}`).join("\n");
                }
            }

            // 显示“正在输入中”
            document.getElementById('chat-typing').style.display = 'block';

            try {
                const res = await fetch(`${aiConfig.url.replace(/\/$/, "")}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${aiConfig.key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        model: aiConfig.model, 
                        messages: [
                            {role: "system", content: friend.persona + worldBookPrompt}, 
                            ...history
                        ] 
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                if(!chatHistories[currentFriendName]) chatHistories[currentFriendName] = [];
                chatHistories[currentFriendName].push({ type: 'friend', text: reply });
                friend.lastMsg = reply; saveData(); renderMessages();
            } catch (e) { 
                alert("回复失败，请检查配置或网络"); 
            } finally {
                // 隐藏“正在输入中”
                document.getElementById('chat-typing').style.display = 'none';
            }
        }

        window.onload = () => { renderChatList(); renderContactList(); };
    </script>
</body>
</html>

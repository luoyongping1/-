<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeChat Ultra</title>
    <style>
        :root {
            --bg-gray: #ededed;
            --border-color: #e5e5e5;
            --wechat-green: #07c160;
            --text-main: #191919;
            --text-sub: #999999;
            --blue-link: #576b95;
            --z-chat: 100;
            --z-settings: 200;
            --z-moments: 300;
            --z-editor: 400;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; background: var(--bg-gray); color: var(--text-main); overflow: hidden; }

        /* 通用页面容器 */
        .page { display: none; flex-direction: column; height: 100%; position: absolute; width: 100%; top: 0; left: 0; background: var(--bg-gray); }
        .page.active { display: flex; }
        
        .header {
            height: 50px; background: var(--bg-gray); display: flex;
            align-items: center; justify-content: space-between; padding: 0 16px;
            font-size: 17px; font-weight: 500; border-bottom: 0.5px solid var(--border-color); flex-shrink: 0;
        }

        .content { flex: 1; overflow-y: auto; padding-bottom: 60px; -webkit-overflow-scrolling: touch; }

        /* 底部导航栏 */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 55px;
            background: #f7f7f7; border-top: 0.5px solid #ccc;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom); z-index: 50;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #333; font-size: 10px; cursor: pointer; }
        .tab-item.active { color: var(--wechat-green); }
        .tab-icon { font-size: 22px; margin-bottom: 2px; }

        /* 列表通用样式 */
        .list-group { background: white; margin-top: 10px; }
        .list-item {
            display: flex; align-items: center; padding: 12px 16px;
            border-bottom: 0.5px solid var(--border-color); cursor: pointer;
        }
        .list-item:active { background: #f2f2f2; }
        
        .avatar { width: 45px; height: 45px; border-radius: 6px; margin-right: 12px; background: #5c6bc0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0; }
        .info { flex: 1; min-width: 0; }
        .name { font-size: 16px; }
        .msg-preview { font-size: 13px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 层级管理 */
        #chat-page { z-index: var(--z-chat); }
        #settings-page { z-index: var(--z-settings); }
        #moments-page { z-index: var(--z-moments); background: white; }
        #editor-page { z-index: var(--z-editor); background: white; }

        /* 朋友圈样式 */
        .moments-header-container { position: relative; height: 280px; background: #333; margin-bottom: 40px; }
        .moments-cover { width: 100%; height: 100%; object-fit: cover; background: #444; }
        .moments-user { position: absolute; right: 15px; bottom: -20px; display: flex; align-items: center; }
        .moments-user .name { color: white; font-weight: bold; margin-right: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .moments-user .main-avatar { width: 70px; height: 70px; border-radius: 8px; border: 2px solid white; background: #0099ff; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        
        .moment-item { display: flex; padding: 15px; border-bottom: 0.5px solid #eee; }
        .moment-content { flex: 1; }
        .moment-name { color: var(--blue-link); font-weight: 500; margin-bottom: 5px; }
        .moment-text { font-size: 15px; line-height: 1.5; margin-bottom: 10px; word-break: break-all; }
        .moment-time { font-size: 12px; color: #999; }

        /* 聊天气泡 */
        #message-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: var(--bg-gray); }
        .msg { display: flex; max-width: 85%; }
        .msg.self { align-self: flex-end; flex-direction: row-reverse; }
        .msg .bubble { padding: 10px 12px; border-radius: 6px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.friend .bubble { background: white; margin-left: 10px; }
        .msg.self .bubble { background: #95ec69; margin-right: 10px; }
        .input-bar { background: #f7f7f7; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 0.5px solid #ccc; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .input-bar input { flex: 1; border: none; padding: 10px; border-radius: 4px; outline: none; font-size: 16px; }

        .btn-green { color: var(--wechat-green); font-weight: bold; cursor: pointer; border:none; background:none; font-size: 16px;}
    </style>
</head>
<body>

    <!-- 主标签页容器 -->
    <div id="tab-chat" class="page active">
        <div class="header">微信</div>
        <div class="content" id="chat-session-list"></div>
    </div>

    <div id="tab-contacts" class="page">
        <div class="header">
            <span>通讯录</span>
            <span class="btn-green" onclick="addFriend()">添加</span>
        </div>
        <div class="content" id="contact-list"></div>
    </div>

    <div id="tab-discover" class="page">
        <div class="header">发现</div>
        <div class="content">
            <div class="list-group">
                <div class="list-item" onclick="openMoments()">
                    <span style="margin-right:15px">🎡</span>
                    <span class="name">朋友圈</span>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-me" class="page">
        <div class="header">我</div>
        <div class="content">
            <div class="list-group">
                <div class="list-item" onclick="configGlobalAI()">
                    <div class="info"><div class="name">API 配置 (AI 回复前提)</div></div>
                    <span style="color:#ccc">></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('tab-chat', this)">
            <span class="tab-icon">💬</span><span>微信</span>
        </div>
        <div class="tab-item" onclick="switchTab('tab-contacts', this)">
            <span class="tab-icon">👥</span><span>通讯录</span>
        </div>
        <div class="tab-item" onclick="switchTab('tab-discover', this)">
            <span class="tab-icon">🧭</span><span>发现</span>
        </div>
        <div class="tab-item" onclick="switchTab('tab-me', this)">
            <span class="tab-icon">👤</span><span>我</span>
        </div>
    </div>

    <!-- 聊天详情页 -->
    <div id="chat-page" class="page">
        <div class="header">
            <span onclick="closeChat()">〈 返回</span>
            <span id="chat-title"></span>
            <span style="font-size:24px; letter-spacing:-2px;" onclick="openSettings()">···</span>
        </div>
        <div id="message-container"></div>
        <div class="input-bar">
            <button class="btn-green" style="font-size:12px;" onclick="getAiReply()">AI回复</button>
            <input type="text" id="msg-input" placeholder="输入消息...">
            <button class="btn-green" onclick="sendMsg()">发送</button>
        </div>
    </div>

    <!-- 聊天设置页 (覆盖在聊天页之上) -->
    <div id="settings-page" class="page">
        <div class="header">
            <span onclick="closeSettings()">〈 返回</span>
            <span>聊天信息</span>
            <span></span>
        </div>
        <div class="content">
            <div class="list-group" style="padding: 20px; display: flex; flex-wrap: wrap; gap: 15px;">
                <div style="text-align: center;">
                    <div id="settings-avatar" class="avatar" style="margin-right:0"></div>
                    <div id="settings-name" style="font-size: 12px; color: #888; margin-top: 5px;"></div>
                </div>
                <div onclick="addFriend()" style="width:45px; height:45px; border:1px dashed #ccc; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#ccc; font-size:30px;">+</div>
            </div>
            <div class="list-group">
                <div class="list-item" onclick="renameCurrentFriend()">
                    <div class="info">备注名</div>
                    <div id="settings-nick-display" style="color:#888"></div>
                    <span style="color:#ccc; margin-left:10px">></span>
                </div>
                <div class="list-item" onclick="openPersonaEditor()">
                    <div class="info">AI 人设 (Prompt)</div>
                    <span style="color:#ccc">></span>
                </div>
            </div>
            <div class="list-group">
                <div class="list-item" onclick="clearHistory()" style="color:#fa5151; justify-content:center;">清空聊天记录</div>
                <div class="list-item" onclick="deleteFriend()" style="color:#fa5151; justify-content:center; font-weight:bold;">删除好友</div>
            </div>
        </div>
    </div>

    <!-- 朋友圈页面 -->
    <div id="moments-page" class="page">
        <div class="header" style="background:transparent; position:absolute; border:none; color:white; text-shadow:1px 1px 2px rgba(0,0,0,0.5); z-index:10;">
            <span onclick="closeMoments()">〈 发现</span>
            <span></span>
            <span onclick="postMoment()" style="font-size:20px;">📷</span>
        </div>
        <div class="content" style="padding-bottom:0">
            <div class="moments-header-container">
                <div class="moments-cover" style="background: linear-gradient(to bottom, #555, #333);"></div>
                <div class="moments-user">
                    <span class="name">我</span>
                    <div class="main-avatar">ME</div>
                </div>
            </div>
            <div id="moments-list"></div>
        </div>
    </div>

    <!-- 全屏编辑器 -->
    <div id="editor-page" class="page">
        <div class="header">
            <span onclick="closePersonaEditor()">取消</span>
            <span id="editor-title">修改人设</span>
            <span class="btn-green" onclick="savePersona()">完成</span>
        </div>
        <textarea id="persona-input" style="width:100%; height:100%; border:none; padding:15px; font-size:16px; outline:none; box-sizing:border-box;"></textarea>
    </div>

    <script>
        // --- 数据管理 ---
        let currentFriendName = "";
        let friends = JSON.parse(localStorage.getItem('qq_friends')) || [
            { name: 'AI 小助手', initial: 'AI', lastMsg: '你好呀！', persona: '你是一个贴心的好朋友。' }
        ];
        let chatHistories = JSON.parse(localStorage.getItem('qq_history')) || {};
        let moments = JSON.parse(localStorage.getItem('qq_moments')) || [
            { name: 'AI 小助手', text: '这是我的第一条朋友圈，欢迎大家！', time: '刚刚' }
        ];
        let aiConfig = JSON.parse(localStorage.getItem('ai_config') || '{"url":"","key":"","model":"gpt-3.5-turbo"}');

        function saveData() {
            localStorage.setItem('qq_friends', JSON.stringify(friends));
            localStorage.setItem('qq_history', JSON.stringify(chatHistories));
            localStorage.setItem('qq_moments', JSON.stringify(moments));
            localStorage.setItem('ai_config', JSON.stringify(aiConfig));
        }

        // --- 导航逻辑 ---
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-bar .tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.page').forEach(p => { if(!['chat-page','settings-page','moments-page','editor-page'].includes(p.id)) p.classList.remove('active')});
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'tab-chat') renderChatList();
            if(tabId === 'tab-contacts') renderContactList();
        }

        // --- 列表渲染 ---
        function renderChatList() {
            const list = document.getElementById('chat-session-list');
            list.innerHTML = '';
            friends.filter(f => f.lastMsg).forEach(f => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.onclick = () => openChat(f.name);
                item.innerHTML = `
                    <div class="avatar">${f.initial}</div>
                    <div class="info">
                        <div class="name">${f.name}</div>
                        <div class="msg-preview">${f.lastMsg}</div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function renderContactList() {
            const list = document.getElementById('contact-list');
            list.innerHTML = '';
            friends.forEach(f => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.onclick = () => openChat(f.name);
                item.innerHTML = `<div class="avatar">${f.initial}</div><div class="info"><div class="name">${f.name}</div></div>`;
                list.appendChild(item);
            });
        }

        function addFriend() {
            const name = prompt("请输入好友昵称:");
            if (name && name.trim()) {
                const n = name.trim();
                if (friends.find(f => f.name === n)) return;
                friends.push({ name: n, initial: n[0].toUpperCase(), lastMsg: '', persona: '你是一个普通朋友。' });
                saveData();
                renderContactList();
            }
        }

        // --- 聊天逻辑 ---
        function openChat(name) {
            currentFriendName = name;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-page').classList.add('active');
            renderMessages();
        }

        function closeChat() {
            document.getElementById('chat-page').classList.remove('active');
            renderChatList();
        }

        function renderMessages() {
            const container = document.getElementById('message-container');
            container.innerHTML = '';
            const friend = friends.find(f => f.name === currentFriendName);
            const history = chatHistories[currentFriendName] || [];
            history.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.type}`;
                const av = m.type === 'self' ? '我' : friend.initial;
                div.innerHTML = `<div class="avatar" style="width:35px;height:35px;font-size:12px;background:${m.type==='self'?'#07c160':'#ccc'}">${av}</div><div class="bubble">${m.text}</div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            if (!chatHistories[currentFriendName]) chatHistories[currentFriendName] = [];
            chatHistories[currentFriendName].push({ type: 'self', text });
            friends.find(f => f.name === currentFriendName).lastMsg = text;
            input.value = '';
            saveData();
            renderMessages();
        }

        // --- 设置页逻辑 ---
        function openSettings() {
            const friend = friends.find(f => f.name === currentFriendName);
            document.getElementById('settings-avatar').innerText = friend.initial;
            document.getElementById('settings-name').innerText = friend.name;
            document.getElementById('settings-nick-display').innerText = friend.name;
            document.getElementById('settings-page').classList.add('active'); // 明确添加 active
        }

        function closeSettings() {
            document.getElementById('settings-page').classList.remove('active');
        }

        function renameCurrentFriend() {
            const n = prompt("修改备注:", currentFriendName);
            if (n && n.trim() && n !== currentFriendName) {
                const old = currentFriendName;
                const friend = friends.find(f => f.name === old);
                friend.name = n.trim(); friend.initial = n.trim()[0].toUpperCase();
                chatHistories[n.trim()] = chatHistories[old]; delete chatHistories[old];
                currentFriendName = n.trim();
                document.getElementById('chat-title').innerText = n.trim();
                document.getElementById('settings-nick-display').innerText = n.trim();
                saveData();
            }
        }

        function clearHistory() {
            if(confirm("确定清空聊天记录？")) {
                chatHistories[currentFriendName] = [];
                friends.find(f => f.name === currentFriendName).lastMsg = '';
                saveData(); renderMessages(); closeSettings();
            }
        }

        function deleteFriend() {
            if(confirm("确定彻底删除好友？")) {
                friends = friends.filter(f => f.name !== currentFriendName);
                delete chatHistories[currentFriendName];
                saveData(); closeSettings(); closeChat(); renderContactList();
            }
        }

        // --- 朋友圈逻辑 ---
        function openMoments() {
            document.getElementById('moments-page').classList.add('active');
            renderMoments();
        }

        function closeMoments() {
            document.getElementById('moments-page').classList.remove('active');
        }

        function renderMoments() {
            const list = document.getElementById('moments-list');
            list.innerHTML = '';
            moments.slice().reverse().forEach(m => {
                const div = document.createElement('div');
                div.className = 'moment-item';
                div.innerHTML = `
                    <div class="avatar" style="width:40px;height:40px;border-radius:4px;background:#aaa;">${m.name[0]}</div>
                    <div class="moment-content">
                        <div class="moment-name">${m.name}</div>
                        <div class="moment-text">${m.text}</div>
                        <div class="moment-time">${m.time}</div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function postMoment() {
            const text = prompt("这一刻的想法...");
            if (text && text.trim()) {
                const now = new Date();
                const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
                moments.push({ name: '我', text: text.trim(), time: timeStr });
                saveData();
                renderMoments();
            }
        }

        // --- AI人设编辑 ---
        function openPersonaEditor() {
            const friend = friends.find(f => f.name === currentFriendName);
            document.getElementById('persona-input').value = friend.persona || "";
            document.getElementById('editor-page').classList.add('active');
        }

        function closePersonaEditor() {
            document.getElementById('editor-page').classList.remove('active');
        }

        function savePersona() {
            const p = document.getElementById('persona-input').value;
            friends.find(f => f.name === currentFriendName).persona = p;
            saveData();
            closePersonaEditor();
        }

        // --- AI API ---
        function configGlobalAI() {
            const url = prompt("API URL (Base URL):", aiConfig.url);
            const key = prompt("API KEY:", aiConfig.key);
            const model = prompt("MODEL (如 gpt-3.5-turbo):", aiConfig.model);
            if(url && key) { aiConfig = {url, key, model}; saveData(); }
        }

        async function getAiReply() {
            if (!aiConfig.key) return alert("请先在'我'标签页配置API信息");
            const friend = friends.find(f => f.name === currentFriendName);
            const history = (chatHistories[currentFriendName] || []).slice(-5).map(m => ({
                role: m.type === 'self' ? 'user' : 'assistant', content: m.text
            }));
            
            try {
                const res = await fetch(`${aiConfig.url.replace(/\/$/, "")}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${aiConfig.key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: aiConfig.model, messages: [{role: "system", content: friend.persona}, ...history] })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                if (!chatHistories[currentFriendName]) chatHistories[currentFriendName] = [];
                chatHistories[currentFriendName].push({ type: 'friend', text: reply });
                friend.lastMsg = reply;
                saveData(); renderMessages();
            } catch (e) { alert("AI连接失败，请检查配置或网络"); }
        }

        // 回车发送
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QQ - 仿微信界面</title>
    <style>
        :root {
            --wechat-bg: #ededed;
            --wechat-green: #07c160;
            --wechat-text: #191919;
            --blue-accent: #0099ff;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--wechat-bg); overflow: hidden; }

        /* 列表页 */
        #list-page { display: flex; flex-direction: column; height: 100%; }
        .header {
            background: var(--wechat-bg); height: 50px; display: flex;
            align-items: center; justify-content: space-between; padding: 0 15px;
            font-weight: bold; border-bottom: 1px solid #ddd;
        }
        .add-btn { font-size: 24px; cursor: pointer; color: #333; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex; align-items: center; padding: 12px 15px;
            background: white; border-bottom: 1px solid #f0f0f0; cursor: pointer;
        }
        .chat-item:active { background: #f2f2f2; }
        .avatar {
            width: 48px; height: 48px; border-radius: 6px;
            background: #ccc; margin-right: 12px; display: flex;
            align-items: center; justify-content: center; color: white; font-weight: bold;
        }
        .chat-info { flex: 1; }
        .chat-name { font-size: 16px; color: var(--wechat-text); margin-bottom: 4px; }
        .chat-last-msg { font-size: 13px; color: #999; }

        /* 聊天页 */
        #chat-page {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--wechat-bg); flex-direction: column; z-index: 10;
        }
        .chat-header {
            height: 50px; background: var(--wechat-bg); display: flex;
            align-items: center; padding: 0 10px; border-bottom: 1px solid #ddd;
        }
        .back-btn { font-size: 16px; cursor: pointer; padding: 10px; color: #333; }
        
        #message-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* 气泡样式 */
        .msg { display: flex; align-items: flex-start; max-width: 85%; }
        .msg.self { align-self: flex-end; flex-direction: row-reverse; }
        .msg.friend { align-self: flex-start; }
        
        .bubble {
            padding: 10px 12px; border-radius: 6px; font-size: 15px; line-height: 1.4;
            position: relative; word-wrap: break-word;
        }
        .msg.friend .bubble { background: white; margin-left: 10px; color: black; }
        .msg.self .bubble { background: var(--wechat-green); margin-right: 10px; color: black; }

        /* 输入栏 */
        .input-bar {
            background: #f7f7f7; padding: 10px; border-top: 1px solid #ddd;
            display: flex; align-items: center; gap: 8px;
        }
        input { flex: 1; border: none; padding: 10px; border-radius: 4px; font-size: 15px; }
        .btn-send { background: var(--wechat-green); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-ai { background: var(--blue-accent); color: white; border: none; padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* 加载动画 */
        .typing { font-size: 12px; color: #999; margin-left: 10px; display: none; }
    </style>
</head>
<body>

    <!-- 好友列表页 -->
    <div id="list-page">
        <div class="header">
            <span>消息</span>
            <span class="add-btn" onclick="addFriend()">+</span>
        </div>
        <div class="chat-list" id="chat-list">
            <!-- 默认好友 -->
            <div class="chat-item" onclick="openChat('AI 小助手', 'AI')">
                <div class="avatar" style="background: #0099ff;">AI</div>
                <div class="chat-info">
                    <div class="chat-name">AI 小助手</div>
                    <div class="chat-last-msg">欢迎使用 AI 聊天功能</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 聊天详情页 -->
    <div id="chat-page">
        <div class="chat-header">
            <span class="back-btn" onclick="closeChat()">〈 返回</span>
            <span id="chat-title" style="flex:1; text-align:center; font-weight:bold;">好友名称</span>
            <span class="typing" id="typing-status">对方正在输入...</span>
            <div style="width:50px"></div>
        </div>
        <div id="message-container"></div>
        <div class="input-bar">
            <button class="btn-ai" onclick="getAiReply()">AI回复</button>
            <input type="text" id="msg-input" placeholder="输入消息...">
            <button class="btn-send" onclick="sendMsg()">发送</button>
        </div>
    </div>

    <script>
        let currentFriend = "";
        let aiConfig = JSON.parse(localStorage.getItem('ai_config') || '{}');

        // 添加好友
        function addFriend() {
            const name = prompt("请输入好友昵称:");
            if (name) {
                const list = document.getElementById('chat-list');
                const newItem = document.createElement('div');
                newItem.className = 'chat-item';
                const initial = name.charAt(0).toUpperCase();
                newItem.onclick = () => openChat(name, initial);
                newItem.innerHTML = `
                    <div class="avatar" style="background: #5c6bc0;">${initial}</div>
                    <div class="chat-info">
                        <div class="chat-name">${name}</div>
                        <div class="chat-last-msg">刚刚添加了好友</div>
                    </div>
                `;
                list.appendChild(newItem);
            }
        }

        // 打开聊天
        function openChat(name, initial) {
            currentFriend = name;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('list-page').style.display = 'none';
            document.getElementById('chat-page').style.display = 'flex';
            document.getElementById('message-container').innerHTML = ''; // 切换好友清空（实际可存数组）
            
            // 初始欢迎语
            appendMsg('friend', `你好！我是${name}。`, initial);
        }

        function closeChat() {
            document.getElementById('list-page').style.display = 'flex';
            document.getElementById('chat-page').style.display = 'none';
        }

        // 渲染消息
        function appendMsg(type, text, initial) {
            const container = document.getElementById('message-container');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            const avatarHtml = `<div class="avatar" style="width:35px; height:35px; font-size:12px; background:${type==='self'?'#07c160':'#ccc'}">${type==='self'?'我':initial}</div>`;
            div.innerHTML = `
                ${avatarHtml}
                <div class="bubble">${text}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            appendMsg('self', text);
            input.value = '';
        }

        // 调用 AI 回复
        async function getAiReply() {
            // 获取最后一条消息作为 Context
            const msgs = document.querySelectorAll('.bubble');
            if (msgs.length === 0) return;
            const lastText = msgs[msgs.length - 1].innerText;

            if (!aiConfig.url || !aiConfig.key) {
                alert("请先在手机主页‘API设置’中配置接口信息！");
                return;
            }

            document.getElementById('typing-status').style.display = 'inline';

            try {
                const response = await fetch(`${aiConfig.url.replace(/\/$/, "")}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${aiConfig.key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: aiConfig.model,
                        messages: [
                            {role: "system", content: "你现在是一个好朋友，正在和用户在QQ上聊天。请用简短、亲切、像真人的方式回复。"},
                            {role: "user", content: lastText}
                        ]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                appendMsg('friend', reply, currentFriend.charAt(0));
            } catch (err) {
                appendMsg('friend', "（网络连接失败，请检查配置）", "!");
            } finally {
                document.getElementById('typing-status').style.display = 'none';
            }
        }

        // 监听回车发送
        document.getElementById('msg-input').onkeypress = function(e) {
            if (e.key === 'Enter') sendMsg();
        };
    </script>
</body>
</html>

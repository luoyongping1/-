<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QQ - 增强版</title>
    <style>
        :root {
            --wechat-bg: #ededed;
            --wechat-green: #07c160;
            --wechat-text: #191919;
            --blue-accent: #0099ff;
            --modal-bg: rgba(0,0,0,0.5);
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--wechat-bg); overflow: hidden; }

        /* 列表页 */
        #list-page { display: flex; flex-direction: column; height: 100%; }
        .header {
            background: var(--wechat-bg); height: 50px; display: flex;
            align-items: center; justify-content: space-between; padding: 0 15px;
            font-weight: bold; border-bottom: 1px solid #ddd;
        }
        .add-btn { font-size: 24px; cursor: pointer; color: #333; padding: 5px; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex; align-items: center; padding: 12px 15px;
            background: white; border-bottom: 1px solid #f0f0f0; cursor: pointer;
        }
        .chat-item:active { background: #f2f2f2; }
        
        .avatar {
            width: 48px; height: 48px; border-radius: 6px;
            background: #ccc; margin-right: 12px; display: flex;
            align-items: center; justify-content: center; color: white; font-weight: bold;
            flex-shrink: 0; font-size: 18px;
        }
        
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-size: 16px; color: var(--wechat-text); margin-bottom: 4px; }
        .chat-last-msg { font-size: 13px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 聊天页 */
        #chat-page {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--wechat-bg); flex-direction: column; z-index: 10;
        }
        .chat-header {
            height: 50px; background: var(--wechat-bg); display: flex;
            align-items: center; padding: 0 10px; border-bottom: 1px solid #ddd;
        }
        .back-btn { font-size: 16px; cursor: pointer; padding: 10px; color: #333; }
        .more-btn { font-size: 20px; cursor: pointer; padding: 10px; font-weight: bold; }
        
        #message-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { display: flex; align-items: flex-start; max-width: 85%; }
        .msg.self { align-self: flex-end; flex-direction: row-reverse; }
        .msg.friend { align-self: flex-start; }
        .msg .avatar { width: 35px; height: 35px; font-size: 14px; margin: 0; }
        .msg.friend .avatar { margin-right: 10px; }
        .msg.self .avatar { margin-left: 10px; }

        .bubble {
            padding: 10px 12px; border-radius: 6px; font-size: 15px; line-height: 1.4;
            position: relative; word-wrap: break-word; word-break: break-all;
        }
        .msg.friend .bubble { background: white; color: black; }
        .msg.self .bubble { background: var(--wechat-green); color: black; }

        .input-bar {
            background: #f7f7f7; padding: 10px; border-top: 1px solid #ddd;
            display: flex; align-items: center; gap: 8px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        input { flex: 1; border: none; padding: 10px; border-radius: 4px; font-size: 15px; outline: none; }
        .btn-send { background: var(--wechat-green); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-ai { background: var(--blue-accent); color: white; border: none; padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* 菜单弹窗 */
        #menu-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg); z-index: 100;
        }
        .menu-content {
            position: absolute; bottom: 0; width: 100%; background: white;
            border-radius: 12px 12px 0 0; overflow: hidden;
        }
        .menu-item {
            padding: 15px; text-align: center; border-bottom: 1px solid #eee;
            font-size: 16px; cursor: pointer;
        }
        .menu-item:active { background: #f9f9f9; }
        .menu-cancel { border-top: 5px solid #eee; color: #999; }

        /* 全屏编辑器 */
        #editor-page {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 200; flex-direction: column;
        }
        .editor-header {
            height: 50px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; border-bottom: 1px solid #eee;
        }
        .editor-header b { font-size: 16px; }
        .editor-body { flex: 1; padding: 15px; }
        textarea {
            width: 100%; height: 100%; border: none; outline: none;
            font-size: 16px; line-height: 1.5; resize: none;
            font-family: inherit;
        }
        .save-btn { color: var(--wechat-green); font-weight: bold; cursor: pointer; }

        .typing { font-size: 12px; color: #999; display: none; margin-left: 5px;}
    </style>
</head>
<body>

    <!-- 主列表页 -->
    <div id="list-page">
        <div class="header">
            <span>消息</span>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span style="font-size: 12px; color: #999; font-weight: normal;" onclick="configGlobalAI()">API配置</span>
                <span class="add-btn" onclick="addFriend()">+</span>
            </div>
        </div>
        <div class="chat-list" id="chat-list"></div>
    </div>

    <!-- 聊天页 -->
    <div id="chat-page">
        <div class="chat-header">
            <span class="back-btn" onclick="closeChat()">〈 返回</span>
            <div style="flex:1; text-align:center; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <span id="chat-title" style="font-weight:bold;"></span>
                <span class="typing" id="typing-status">对方正在输入...</span>
            </div>
            <span class="more-btn" onclick="showMenu()">···</span>
        </div>
        <div id="message-container"></div>
        <div class="input-bar">
            <button class="btn-ai" onclick="getAiReply()">AI回复</button>
            <input type="text" id="msg-input" placeholder="输入消息...">
            <button class="btn-send" onclick="sendMsg()">发送</button>
        </div>
    </div>

    <!-- 底部菜单遮罩 -->
    <div id="menu-overlay" onclick="hideMenu()">
        <div class="menu-content" onclick="event.stopPropagation()">
            <div class="menu-item" onclick="renameCurrentFriend()">修改好友名称</div>
            <div class="menu-item" onclick="openPersonaEditor()">修改好友AI人设</div>
            <div class="menu-item" style="color: red;" onclick="deleteCurrentFriend()">删除好友及记录</div>
            <div class="menu-item menu-cancel" onclick="hideMenu()">取消</div>
        </div>
    </div>

    <!-- 全屏人设编辑器 -->
    <div id="editor-page">
        <div class="editor-header">
            <span onclick="closePersonaEditor()">取消</span>
            <b>编辑AI人设</b>
            <span class="save-btn" onclick="savePersona()">完成</span>
        </div>
        <div class="editor-body">
            <textarea id="persona-input" placeholder="请在这里描述该好友的性格、语气、爱好或背景故事..."></textarea>
        </div>
    </div>

    <script>
        let currentFriendName = "";
        let aiConfig = JSON.parse(localStorage.getItem('ai_config') || '{"url":"","key":"","model":"gpt-3.5-turbo"}');
        
        // 数据结构：friends = [{name, initial, lastMsg, persona}]
        let friends = JSON.parse(localStorage.getItem('qq_friends')) || [
            { name: 'AI 小助手', initial: 'AI', lastMsg: '欢迎使用 AI 聊天', persona: '你是一个热情的AI助手。' }
        ];
        // 数据结构：chatHistories = { "张三": [{type, text}] }
        let chatHistories = JSON.parse(localStorage.getItem('qq_history')) || {};

        window.onload = renderFriendList;

        function saveData() {
            localStorage.setItem('qq_friends', JSON.stringify(friends));
            localStorage.setItem('qq_history', JSON.stringify(chatHistories));
            localStorage.setItem('ai_config', JSON.stringify(aiConfig));
        }

        function renderFriendList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            friends.forEach(f => {
                const newItem = document.createElement('div');
                newItem.className = 'chat-item';
                newItem.onclick = () => openChat(f.name);
                newItem.innerHTML = `
                    <div class="avatar" style="background: ${f.name==='AI 小助手'?'#0099ff':'#5c6bc0'};">${f.initial}</div>
                    <div class="chat-info">
                        <div class="chat-name">${f.name}</div>
                        <div class="chat-last-msg">${f.lastMsg || ''}</div>
                    </div>
                `;
                list.appendChild(newItem);
            });
        }

        function addFriend() {
            const name = prompt("请输入好友昵称:");
            if (name && name.trim()) {
                const trimmedName = name.trim();
                if (friends.find(f => f.name === trimmedName)) return alert("好友已存在");
                const initial = trimmedName.charAt(0).toUpperCase();
                friends.push({ 
                    name: trimmedName, 
                    initial, 
                    lastMsg: '我们已经是好友了，开始聊天吧',
                    persona: '你是一个普通的朋友，回复要简短自然。'
                });
                saveData();
                renderFriendList();
            }
        }

        function openChat(name) {
            currentFriendName = name;
            const friend = friends.find(f => f.name === name);
            document.getElementById('chat-title').innerText = name;
            document.getElementById('list-page').style.display = 'none';
            document.getElementById('chat-page').style.display = 'flex';
            
            const container = document.getElementById('message-container');
            container.innerHTML = '';
            
            const history = chatHistories[name] || [];
            history.forEach(m => renderMsg(m.type, m.text, friend.initial));
            
            if (history.length === 0) {
                appendAndSaveMsg('friend', `你好！我是${name}。`);
            }
        }

        function closeChat() {
            document.getElementById('list-page').style.display = 'flex';
            document.getElementById('chat-page').style.display = 'none';
            renderFriendList();
        }

        function renderMsg(type, text, initial) {
            const container = document.getElementById('message-container');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            const avatarHtml = `<div class="avatar" style="background:${type==='self'?'#07c160':'#ccc'}">${type==='self'?'我':initial}</div>`;
            div.innerHTML = `${avatarHtml}<div class="bubble">${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function appendAndSaveMsg(type, text) {
            const friend = friends.find(f => f.name === currentFriendName);
            if (!chatHistories[currentFriendName]) chatHistories[currentFriendName] = [];
            
            chatHistories[currentFriendName].push({ type, text });
            if (friend) friend.lastMsg = text;
            
            saveData();
            renderMsg(type, text, friend ? friend.initial : "?");
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            appendAndSaveMsg('self', text);
            input.value = '';
        }

        // --- 功能扩展：菜单与编辑 ---

        function showMenu() { document.getElementById('menu-overlay').style.display = 'block'; }
        function hideMenu() { document.getElementById('menu-overlay').style.display = 'none'; }

        function renameCurrentFriend() {
            hideMenu();
            const newName = prompt("请输入新的昵称:", currentFriendName);
            if (newName && newName.trim() && newName !== currentFriendName) {
                const oldName = currentFriendName;
                const trimmedNewName = newName.trim();
                
                // 1. 更新好友列表中的名称
                const friend = friends.find(f => f.name === oldName);
                friend.name = trimmedNewName;
                friend.initial = trimmedNewName.charAt(0).toUpperCase();

                // 2. 迁移聊天记录
                if (chatHistories[oldName]) {
                    chatHistories[trimmedNewName] = chatHistories[oldName];
                    delete chatHistories[oldName];
                }

                currentFriendName = trimmedNewName;
                document.getElementById('chat-title').innerText = trimmedNewName;
                saveData();
                alert("修改成功");
            }
        }

        function deleteCurrentFriend() {
            if (confirm(`确定要删除好友 "${currentFriendName}" 及其所有聊天记录吗？`)) {
                friends = friends.filter(f => f.name !== currentFriendName);
                delete chatHistories[currentFriendName];
                saveData();
                closeChat();
                hideMenu();
            }
        }

        function openPersonaEditor() {
            hideMenu();
            const friend = friends.find(f => f.name === currentFriendName);
            document.getElementById('persona-input').value = friend.persona || "";
            document.getElementById('editor-page').style.display = 'flex';
        }

        function closePersonaEditor() {
            document.getElementById('editor-page').style.display = 'none';
        }

        function savePersona() {
            const newPersona = document.getElementById('persona-input').value;
            const friend = friends.find(f => f.name === currentFriendName);
            if (friend) {
                friend.persona = newPersona;
                saveData();
                alert("人设已更新");
            }
            closePersonaEditor();
        }

        function configGlobalAI() {
            const url = prompt("请输入 API Base URL (如: https://api.openai.com/v1):", aiConfig.url);
            const key = prompt("请输入 API KEY:", aiConfig.key);
            const model = prompt("请输入模型名称 (如: gpt-3.5-turbo):", aiConfig.model);
            if (url && key) {
                aiConfig = { url, key, model };
                saveData();
            }
        }

        async function getAiReply() {
            const friend = friends.find(f => f.name === currentFriendName);
            const history = chatHistories[currentFriendName] || [];
            
            if (!aiConfig.url || !aiConfig.key) {
                return alert("请先在首页点击'API配置'设置接口信息！");
            }

            document.getElementById('typing-status').style.display = 'inline';

            // 构建上下文（取最近5条）
            const context = history.slice(-5).map(m => ({
                role: m.type === 'self' ? 'user' : 'assistant',
                content: m.text
            }));

            try {
                const response = await fetch(`${aiConfig.url.replace(/\/$/, "")}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${aiConfig.key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: aiConfig.model,
                        messages: [
                            {role: "system", content: friend.persona || "你是一个普通的朋友。"},
                            ...context
                        ]
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    appendAndSaveMsg('friend', reply);
                } else {
                    throw new Error("接口返回异常");
                }
            } catch (err) {
                console.error(err);
                renderMsg('friend', "（AI连接失败，请检查配置或网络）", "!");
            } finally {
                document.getElementById('typing-status').style.display = 'none';
            }
        }

        document.getElementById('msg-input').onkeypress = function(e) {
            if (e.key === 'Enter') sendMsg();
        };
    </script>
</body>
</html>
